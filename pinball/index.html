<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AURORA PINBALL">
<meta name="theme-color" content="#050505">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<title>AURORA INDUSTRIES — PINBALL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#050505;overflow:hidden;
  touch-action:none;-webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
  display:flex;align-items:center;justify-content:center}
canvas{display:block;touch-action:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script src="matter.min.js"></script>
<script src="table.js"></script>
<script>
'use strict';
// roundRect polyfill (iOS < 16.4)
if (typeof CanvasRenderingContext2D !== 'undefined' && !CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r){
    if (typeof r === 'number') r = [r, r, r, r];
    else if (Array.isArray(r)){ if (r.length === 1) r = [r[0], r[0], r[0], r[0]]; }
    else r = [0, 0, 0, 0];
    const m = Math.min(Math.abs(w) / 2, Math.abs(h) / 2);
    r = r.map(v => Math.min(v, m));
    this.moveTo(x + r[0], y);
    this.arcTo(x + w, y, x + w, y + h, r[1]);
    this.arcTo(x + w, y + h, x, y + h, r[2]);
    this.arcTo(x, y + h, x, y, r[3]);
    this.arcTo(x, y, x + w, y, r[0]);
    this.closePath();
    return this;
  };
}
const T = PinTable, W = T.W, H = T.H;
const { Engine, World, Body } = Matter;

// PWA: offline cache + installability
if (typeof navigator !== 'undefined' && 'serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ════════════════════════════════════════════
// CANVAS (retina-sharp)
// ════════════════════════════════════════════
const cv = document.getElementById('c');
const g = cv.getContext('2d');
let SC = 1;
function resize(){
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  const d = Math.min(window.devicePixelRatio || 1, 3);
  SC = s * d;
  cv.width = Math.round(W * SC); cv.height = Math.round(H * SC);
  cv.style.width = W * s + 'px'; cv.style.height = H * s + 'px';
}
resize();
window.addEventListener('resize', resize);

// ════════════════════════════════════════════
// PALETTE
// ════════════════════════════════════════════
const C = {
  gold:'#B8903A', gLt:'#D4AA50', gDk:'#7A6025', gGlow:'#E0B850',
  gun:'#181818', gun2:'#222224', gun3:'#2E2E30', mid:'#484848',
  sil:'#A0A0AA', silLt:'#D0D0D8',
  c0:'#f8f8f8', c1:'#d0d0d6', c2:'#909098', c3:'#404048',
};
const MODES = ['INITIATE','ASSEMBLE','CALIBRATE','INNOVATE','ELEVATE'];
const MNEED = 3;
const INFO_Y = T.INFO_Y, INFO_H = H - INFO_Y;
const PL=T.PL, PR=T.PR, PT=T.PT, PB=T.PB, PCX=T.PCX,
      ACX=T.ACX, ACY=T.ACY, ARX=T.ARX, ARY=T.ARY,
      CMX=T.CMX, CMY0=T.CMY0, CMDY=T.CMDY, BR=T.BR;

// ════════════════════════════════════════════
// AUDIO (synthesized, no assets)
// ════════════════════════════════════════════
let muted = localStorage.getItem('aurora_mute') === '1';
let AC = null;
function ac(){
  if (muted) return null;
  if (!AC){ const A = window.AudioContext || window.webkitAudioContext; if (!A) return null; AC = new A(); }
  if (AC.state === 'suspended') AC.resume();
  return AC;
}
function beep(f0, f1, dur, type, vol, delay){
  const a = ac(); if (!a) return;
  const t0 = a.currentTime + (delay || 0);
  const o = a.createOscillator(), gn = a.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(Math.max(f0,1), t0);
  o.frequency.exponentialRampToValueAtTime(Math.max(f1,1), t0 + dur);
  gn.gain.setValueAtTime(vol || 0.3, t0);
  gn.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.connect(gn); gn.connect(a.destination);
  o.start(t0); o.stop(t0 + dur + 0.03);
}
function nz(dur, vol, delay){
  const a = ac(); if (!a) return;
  const t0 = a.currentTime + (delay || 0);
  const n = Math.floor(a.sampleRate * dur);
  const buf = a.createBuffer(1, n, a.sampleRate), d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
  const s = a.createBufferSource(); s.buffer = buf;
  const gn = a.createGain(); gn.gain.value = vol;
  s.connect(gn); gn.connect(a.destination); s.start(t0);
}
const arp = (ns, dur, type, vol, gap) => ns.forEach((f, i) => beep(f, f, dur, type, vol, i * gap));
const sfx = {
  flip: () => beep(170, 120, .05, 'square', .16),
  bump: () => { beep(850, 420, .09, 'triangle', .5); nz(.03, .22); },
  sling: () => beep(430, 290, .07, 'square', .28),
  target: () => { beep(240, 160, .09, 'square', .38); nz(.04, .18); },
  bank: () => arp([660, 880, 1175], .12, 'square', .26, .09),
  mode: () => arp([523, 659, 784, 1047], .11, 'square', .24, .08),
  complete: () => arp([523, 659, 784, 1047, 1319, 1568], .14, 'square', .27, .09),
  orbit: () => beep(600, 1100, .14, 'sine', .38),
  lock: () => arp([392, 523], .1, 'square', .3, .09),
  mball: () => arp([392, 523, 659, 784, 1047], .16, 'sawtooth', .2, .1),
  launch: p => { nz(.12, .35); beep(90, 55, .18, 'sine', .45 + p * .3); },
  drain: () => beep(280, 55, .5, 'sawtooth', .28),
  save: () => arp([784, 1047], .1, 'square', .3, .08),
  nudge: () => beep(95, 60, .07, 'sine', .5),
  tilt: () => beep(220, 70, .6, 'square', .32),
  over: () => arp([523, 440, 349, 262], .22, 'sawtooth', .22, .18),
};

// ════════════════════════════════════════════
// PHYSICS WORLD + GAME STATE
// ════════════════════════════════════════════
const tb = T.build(Matter);
const LF = tb.LF, RF = tb.RF;

let state = 'title';            // 'title' | 'play' | 'over'
let score = 0, ballNum = 1;
let hi = +localStorage.getItem('aurora_hi2') || 0;
let mode = 0, mhits = 0;
let locks = 0;
let saveUntil = 0, sysBoostUntil = 0, x3Until = 0;
let tilted = false, nudges = [];
let pull = 0;
let balls = [];
let parts = [], ftxts = [];
let cmFl = [0,0,0,0,0], shakeT = 0;
const now = () => performance.now();

function multNow(){
  let m = 1;
  if (now() < x3Until) m *= 3;
  if (balls.length > 1) m *= 2;
  return m;
}
function pts(p, pos){
  if (state !== 'play' || tilted) return;
  const v = p * multNow();
  score += v;
  if (score > hi){ hi = score; localStorage.setItem('aurora_hi2', hi); }
  if (p >= 100 && pos) ft('+' + v, pos, C.gLt, 13);
}
function ft(t, pos, col, sz){ ftxts.push({ t, x: pos.x, y: pos.y, vy: -0.88, col: col || C.gLt, sz: sz || 13, life: 72 }); }
function burst(p, col, n){
  for (let i = 0; i < n; i++){
    const a = Math.random() * Math.PI * 2, s = 1.2 + Math.random() * 3;
    parts.push({ x: p.x, y: p.y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 22 + Math.random() * 18, col, r: 1 + Math.random() * 2.2 });
  }
}

// ── Balls ─────────────────────────────────────────────
function newBallInLane(noSave){
  const b = tb.addBall(T.LANE_X, 629);
  b.plugin.inLane = true; b.plugin.fromPlunger = true; b.plugin.trail = [];
  b.plugin.noSave = !!noSave;   // a save-returned ball doesn't re-arm the saver
  balls.push(b);
}
function rampBall(delay){
  setTimeout(() => {
    if (state !== 'play') return;
    const p0 = T.bez(0);
    const b = tb.addBall(p0.x, p0.y);
    b.plugin.trail = [];
    b.plugin.guide = { t: 0, rate: 3.2 };
    b.collisionFilter = { category: 1, mask: 0 };
    balls.push(b);
  }, delay);
}
function launchFromPlunger(power){
  const b = balls.find(x => x.plugin.inLane && x.position.y > 600);
  if (!b) return;
  Body.setVelocity(b, { x: 0, y: -(T.LAUNCH_MIN + T.LAUNCH_RNG * power) });
  sfx.launch(power);
}
function removeBall(b){
  const i = balls.indexOf(b);
  if (i >= 0) balls.splice(i, 1);
  tb.removeBall(b);
}
function onDrain(b){
  burst(b.position, '#666', 14);
  removeBall(b);
  sfx.drain();
  if (balls.length > 0){
    if (balls.length === 1) ft('MULTIBALL END', { x: PCX, y: 320 }, C.gLt, 15);
    return;
  }
  if (now() < saveUntil && !tilted){
    saveUntil = 0;
    ft('BALL SAVED!', { x: PCX, y: 340 }, C.gLt, 20);
    sfx.save();
    setTimeout(() => { if (state === 'play') newBallInLane(true); }, 600);
    return;
  }
  endOfBall();
}
function endOfBall(){
  tilted = false; nudges = []; saveUntil = 0; sysBoostUntil = 0;
  if (ballNum >= 3){
    state = 'over';
    sfx.over();
  } else {
    ballNum++;
    setTimeout(() => { if (state === 'play') newBallInLane(); }, 900);
  }
}
function startGame(){
  balls.slice().forEach(removeBall);
  [...tb.vbT, ...tb.sbT].forEach(t => {
    t.plugin.dropped = false; t.plugin.sink = 0; t.plugin.fl = 0; t.plugin.cd = 0;
    t.collisionFilter = { category: 4, mask: 1 };
  });
  tb.bumps.forEach(b => { b.plugin.fl = 0; b.plugin.cd = 0; });
  score = 0; ballNum = 1; mode = 0; mhits = 0; locks = 0;
  saveUntil = 0; sysBoostUntil = 0; x3Until = 0;
  tilted = false; nudges = []; pull = 0;
  parts = []; ftxts = []; cmFl = [0,0,0,0,0];
  state = 'play';
  newBallInLane();
}

// ── Feature events (from physics scan) ────────────────
function modeHit(pos){
  mhits++; pts(500, pos); cmFl[mode] = 64;
  if (mhits >= MNEED){
    mhits = 0;
    if (mode < 4){
      mode++;
      ft(MODES[mode] + '!', { x: PCX, y: CMY0 + mode * CMDY - 20 }, C.gLt, 22);
      sfx.mode();
      if (mode === 4){
        x3Until = now() + 20000;
        ft('3X SCORING!', { x: PCX, y: 300 }, C.gLt, 20);
      }
    } else {
      pts(8000, { x: PCX, y: 440 });
      ft('AURORA COMPLETE!', { x: PCX, y: 425 }, C.gLt, 18);
      sfx.complete();
      mode = 0;
    }
  }
}
function startMultiball(){
  ft('MULTIBALL!', { x: PCX, y: 300 }, C.gLt, 24);
  sfx.mball();
  rampBall(200); rampBall(1300);
}
function onEvent(type, d, pos){
  if (state !== 'play') return;
  if (type === 'bumper'){
    pts(now() < sysBoostUntil ? 200 : 100, pos);
    burst(pos, C.gLt, 10); sfx.bump();
  } else if (type === 'sling'){
    pts(10, null); sfx.sling();
  } else if (type === 'target'){
    const arr = d.bank ? tb.sbT : tb.vbT;
    const t = arr[d.i];
    t.plugin.dropped = true; t.plugin.fl = 52;
    t.collisionFilter = { category: 4, mask: 0 };
    pts(d.bank ? 500 : 300, pos);
    burst(pos, C.gLt, 8); sfx.target();
    if (arr.every(x => x.plugin.dropped)){
      if (d.bank){
        pts(2000, { x: PR - 90, y: 300 });
        ft('SYSTEMS BANK!', { x: PCX, y: 300 }, C.gLt, 18);
        sysBoostUntil = now() + 10000;
      } else {
        pts(1500, { x: PL + 90, y: 300 });
        ft('VECTOR BANK!', { x: PCX, y: 300 }, C.gLt, 18);
      }
      sfx.bank();
      modeHit({ x: CMX, y: CMY0 + mode * CMDY });
      setTimeout(() => arr.forEach(x => {
        x.plugin.dropped = false;
        x.collisionFilter = { category: 4, mask: 1 };
      }), 1100);
    }
  } else if (type === 'mode'){
    if (d === mode) modeHit(pos);
    else if (d < mode) pts(80, pos);
  } else if (type === 'orbit'){
    pts(250, pos); sfx.orbit();
    locks++;
    if (locks >= 3){
      locks = 0;
      startMultiball();
    } else {
      ft('LOCK ' + locks, { x: PR - 60, y: 200 }, C.gLt, 15);
      sfx.lock();
    }
  }
}

// ── Nudge / tilt ──────────────────────────────────────
function doNudge(){
  if (state !== 'play' || tilted) return;
  sfx.nudge(); shakeT = 10;
  const t = now();
  nudges.push(t);
  nudges = nudges.filter(x => t - x < 1800);
  balls.forEach(b => {
    if (b.plugin.guide || b.plugin.inLane) return;
    Body.setVelocity(b, { x: b.velocity.x + (Math.random() - .5) * 1.8, y: b.velocity.y - 2.4 });
  });
  if (nudges.length >= 3){
    tilted = true; nudges = [];
    LF.on = RF.on = false;
    ft('TILT!', { x: PCX, y: 340 }, '#ff3030', 26);
    sfx.tilt();
  }
}

// ════════════════════════════════════════════
// FIXED-STEP PHYSICS (120 Hz — correct on ProMotion displays)
// ════════════════════════════════════════════
const STEP = 1000 / 120;
function physStep(){
  if (state !== 'play') return;
  T.stepFlippers(tb, tilted);

  for (const b of balls.slice()){
    const pl = b.plugin;
    if (pl.guide){
      pl.guide.t += pl.guide.rate * STEP / 1000;
      if (pl.guide.t >= 1){
        const tan = T.bezTan(1);
        const sp = Math.max(4, Math.min(pl.guide.rate * T.RAMP_LEN / 60, 11));
        const p1 = T.bez(1);
        Body.setPosition(b, p1);
        b.collisionFilter = { category: 1, mask: 0xFFFF };
        Body.setVelocity(b, { x: tan.x * sp, y: tan.y * sp });
        pl.guide = null;
        if (pl.inLane){
          pl.inLane = false;
          if (pl.fromPlunger){ pl.fromPlunger = false; if (!pl.noSave) saveUntil = now() + 6000; }
        }
      } else {
        Body.setPosition(b, T.bez(pl.guide.t));
        Body.setVelocity(b, { x: 0, y: 0 });
      }
    } else if (pl.inLane && b.velocity.y < 0 && b.position.y < T.GUIDE_Y && b.position.x > PR + 6){
      const vTop = -b.velocity.y;
      pl.guide = { t: 0, rate: Math.max(1.1, Math.min(vTop * 60 / T.RAMP_LEN, 6)) };
      b.collisionFilter = { category: 1, mask: 0 };
    }
  }

  // scan BEFORE the solver so impact velocities are still unresolved
  T.scan(tb, balls, onEvent);
  Engine.update(tb.eng, STEP);

  for (const b of balls.slice()){
    if (!T.clampBall(tb, b)){ onDrain(b); continue; }
    if (b.position.y > PB + 14 && b.position.x < PR + 6) onDrain(b);
  }

  // visual timers
  tb.bumps.forEach(b => { if (b.plugin.fl > 0) b.plugin.fl--; });
  [tb.slingL, tb.slingR].forEach(s => { if (s.plugin.fl > 0) s.plugin.fl--; });
  [...tb.vbT, ...tb.sbT].forEach(t => {
    if (t.plugin.fl > 0) t.plugin.fl--;
    const tgt = t.plugin.dropped ? 1 : 0;
    t.plugin.sink += (tgt - t.plugin.sink) * 0.12;
  });
  cmFl = cmFl.map(v => v > 0 ? v - 1 : 0);
  if (shakeT > 0) shakeT--;
}

// ════════════════════════════════════════════
// INPUT
// ════════════════════════════════════════════
const touches = new Map();
function lpos(e){
  const r = cv.getBoundingClientRect();
  return { x: (e.clientX - r.left) / (r.width / W), y: (e.clientY - r.top) / (r.height / H) };
}
function pDown(id, x, y){
  ac(); // unlock audio on first gesture
  if (state === 'title'){ startGame(); return; }
  if (state === 'over'){ startGame(); return; }
  if (x < 38 && y < 32){ muted = !muted; localStorage.setItem('aurora_mute', muted ? '1' : '0'); return; }
  if (x > PR + 6 && balls.some(b => b.plugin.inLane && b.position.y > 600)){
    touches.set(id, { role: 'plunger', sy: y }); return;
  }
  if (y >= INFO_Y){ touches.set(id, { role: 'nudge', sy: y, used: false }); return; }
  if (x < W / 2){ if (!LF.on && !tilted) sfx.flip(); LF.on = true; touches.set(id, { role: 'L' }); }
  else { if (!RF.on && !tilted) sfx.flip(); RF.on = true; touches.set(id, { role: 'R' }); }
}
function pMove(id, x, y){
  const t = touches.get(id); if (!t) return;
  if (t.role === 'plunger'){ pull = Math.max(0, Math.min((y - t.sy) / 130, 1)); }
  else if (t.role === 'nudge' && !t.used && t.sy - y > 24){ t.used = true; doNudge(); }
}
function pUp(id){
  const t = touches.get(id); if (!t) return;
  touches.delete(id);
  if (t.role === 'L') LF.on = false;
  else if (t.role === 'R') RF.on = false;
  else if (t.role === 'plunger'){
    if (pull > 0.04) launchFromPlunger(pull);
    pull = 0;
  }
}
cv.addEventListener('touchstart', e => { e.preventDefault(); for (const t of e.changedTouches){ const p = lpos(t); pDown(t.identifier, p.x, p.y); } }, { passive: false });
cv.addEventListener('touchmove', e => { e.preventDefault(); for (const t of e.changedTouches){ const p = lpos(t); pMove(t.identifier, p.x, p.y); } }, { passive: false });
cv.addEventListener('touchend', e => { e.preventDefault(); for (const t of e.changedTouches) pUp(t.identifier); }, { passive: false });
cv.addEventListener('touchcancel', e => { for (const t of e.changedTouches) pUp(t.identifier); });
cv.addEventListener('mousedown', e => { const p = lpos(e); pDown('m', p.x, p.y); });
cv.addEventListener('mousemove', e => { const p = lpos(e); pMove('m', p.x, p.y); });
cv.addEventListener('mouseup', () => pUp('m'));
document.addEventListener('gesturestart', e => e.preventDefault());

// keyboard (desktop testing)
let kbPull = false;
document.addEventListener('keydown', e => {
  if (e.repeat) return;
  if (state !== 'play'){ if (e.code === 'Enter' || e.code === 'Space') startGame(); return; }
  if (e.code === 'ArrowLeft' || e.code === 'KeyZ'){ if (!LF.on && !tilted) sfx.flip(); LF.on = true; }
  if (e.code === 'ArrowRight' || e.code === 'Slash' || e.code === 'KeyM'){ if (!RF.on && !tilted) sfx.flip(); RF.on = true; }
  if (e.code === 'Space' || e.code === 'ArrowDown') kbPull = true;
  if (e.code === 'KeyN') doNudge();
});
document.addEventListener('keyup', e => {
  if (e.code === 'ArrowLeft' || e.code === 'KeyZ') LF.on = false;
  if (e.code === 'ArrowRight' || e.code === 'Slash' || e.code === 'KeyM') RF.on = false;
  if (e.code === 'Space' || e.code === 'ArrowDown'){
    kbPull = false;
    if (pull > 0.04) launchFromPlunger(pull);
    pull = 0;
  }
});

// ════════════════════════════════════════════
// SHADOW HELPERS
// ════════════════════════════════════════════
function ds(ctx, ox, oy, bl, col){ ctx.shadowOffsetX = ox; ctx.shadowOffsetY = oy; ctx.shadowBlur = bl; ctx.shadowColor = col || 'rgba(0,0,0,0.58)'; }
function cs(ctx){ ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0; ctx.shadowBlur = 0; ctx.shadowColor = 'transparent'; }

// ════════════════════════════════════════════
// PRE-RENDERED BACKGROUND
// ════════════════════════════════════════════
const BGS = 2;
let bgCv = null;
function buildBG(){
  bgCv = document.createElement('canvas');
  bgCv.width = W * BGS; bgCv.height = H * BGS;
  const b = bgCv.getContext('2d');
  b.scale(BGS, BGS);

  // Cabinet base
  b.fillStyle = '#0c0c0e'; b.fillRect(0, 0, W, H);
  for (let y = 0; y < H; y += 3){ b.fillStyle = `rgba(255,255,255,${0.010 + Math.sin(y * 0.8) * 0.004})`; b.fillRect(0, y, W, 1); }

  // Side rails
  const lG = b.createLinearGradient(0, 0, 22, 0);
  lG.addColorStop(0, '#080808'); lG.addColorStop(0.38, '#343438'); lG.addColorStop(0.7, '#262628'); lG.addColorStop(1, '#181818');
  b.fillStyle = lG; b.fillRect(0, 0, 22, H);
  const rG = b.createLinearGradient(W - 22, 0, W, 0);
  rG.addColorStop(0, '#181818'); rG.addColorStop(0.3, '#262628'); rG.addColorStop(0.62, '#343438'); rG.addColorStop(1, '#080808');
  b.fillStyle = rG; b.fillRect(W - 22, 0, 22, H);
  const tCap = b.createLinearGradient(0, 0, 0, 24); tCap.addColorStop(0, '#303034'); tCap.addColorStop(1, '#161618');
  b.fillStyle = tCap; b.fillRect(0, 0, W, 24);
  const bCap = b.createLinearGradient(0, H - 24, 0, H); bCap.addColorStop(0, '#161618'); bCap.addColorStop(1, '#303034');
  b.fillStyle = bCap; b.fillRect(0, H - 24, W, 24);

  // Phillips screws
  [[9,22],[9,H*0.25],[9,H*0.5],[9,H*0.75],[9,H-22],

// tall chrome+white mushroom pop bumper (matches the baked reference style)
function drawBumper(x, y, fl, boosted){
  const R = 26;
  ds(g, 4, 7, 14, 'rgba(0,0,0,0.5)'); g.beginPath(); g.arc(x, y, R, 0, Math.PI*2); g.fillStyle = 'rgba(0,0,0,0.5)'; g.fill(); cs(g);
  // machined base skirt
  let bg = g.createRadialGradient(x-R*0.35, y-R*0.4, 2, x, y, R);
  bg.addColorStop(0,'#f4f4f8'); bg.addColorStop(0.35,'#d2d2da'); bg.addColorStop(0.62,'#a6a6b0'); bg.addColorStop(0.85,'#7c7c86'); bg.addColorStop(1,'#54545e');
  g.beginPath(); g.arc(x, y, R, 0, Math.PI*2); g.fillStyle = bg; g.fill();
  g.strokeStyle = 'rgba(40,40,48,0.8)'; g.lineWidth = 1.4; g.stroke();
  g.beginPath(); g.arc(x, y, R-1.5, Math.PI*0.18, Math.PI*0.92); g.strokeStyle = 'rgba(20,20,28,0.35)'; g.lineWidth = 3; g.stroke();
  // gold accent ring (lights up on hit)
  if (fl > 0) ds(g, 0, 0, fl*26, C.gLt);
  g.beginPath(); g.arc(x, y, R*0.86, 0, Math.PI*2);
  g.strokeStyle = fl > 0 ? C.gLt : (boosted ? C.gGlow : 'rgba(190,158,86,0.5)'); g.lineWidth = 2.4; g.stroke(); cs(g);
  // chrome ring
  let mg = g.createRadialGradient(x-R*0.3, y-R*0.3, 1, x, y, R*0.72);
  mg.addColorStop(0,'#ffffff'); mg.addColorStop(0.4,'#c8c8d2'); mg.addColorStop(0.8,'#8e8e98'); mg.addColorStop(1,'#bcbcc6');
  g.beginPath(); g.arc(x, y, R*0.72, 0, Math.PI*2); g.fillStyle = mg; g.fill();
  // white plastic dome
  let dg = g.createRadialGradient(x-R*0.28, y-R*0.34, 1, x, y, R*0.5);
  dg.addColorStop(0,'#ffffff'); dg.addColorStop(0.55,'#f0f0f2'); dg.addColorStop(0.85,'#d2d2d8'); dg.addColorStop(1,'#aeaeb6');
  if (fl > 0) ds(g, 0, 0, fl*16, C.gGlow);
  g.beginPath(); g.arc(x, y, R*0.5, 0, Math.PI*2); g.fillStyle = dg; g.fill(); cs(g);
  g.strokeStyle = 'rgba(150,150,158,0.6)'; g.lineWidth = 0.8; g.stroke();
  // centre cap + screw
  g.beginPath(); g.arc(x, y, R*0.16, 0, Math.PI*2); g.fillStyle = fl > 0 ? C.gLt : '#9a9aa2'; g.fill();
  g.beginPath(); g.arc(x, y, R*0.07, 0, Math.PI*2); g.fillStyle = '#5a5a62'; g.fill();
  // speculars
  let hg = g.createRadialGradient(x-R*0.42, y-R*0.46, 0, x-R*0.32, y-R*0.36, R*0.42);
  hg.addColorStop(0,'rgba(255,255,255,0.95)'); hg.addColorStop(0.5,'rgba(255,255,255,0.35)'); hg.addColorStop(1,'rgba(255,255,255,0)');
  g.beginPath(); g.arc(x-R*0.3, y-R*0.34, R*0.42, 0, Math.PI*2); g.fillStyle = hg; g.fill();
  g.beginPath(); g.arc(x+R*0.28, y-R*0.5, R*0.1, 0, Math.PI*2); g.fillStyle = 'rgba(255,255,255,0.4)'; g.fill();
}

function drawTarget(body){
  const { x, y } = body.position;
  const fl = body.plugin.fl, sink = body.plugin.sink;
  g.save(); g.translate(x, y); g.rotate(body.angle);
  const hw = 22, hh = 10;
  ds(g, 2, 3, 6); g.beginPath(); g.roundRect(-hw-2, -hh-1, hw*2+4, hh*2+2, 4); g.fillStyle = 'rgba(0,0,0,0.32)'; g.fill(); cs(g);
  const pg = g.createLinearGradient(0, -hh, 0, hh); pg.addColorStop(0,'#303032'); pg.addColorStop(0.4,'#262628'); pg.addColorStop(1,'#1c1c1e');
  g.beginPath(); g.roundRect(-hw-2, -hh-1, hw*2+4, hh*2+2, 4); g.fillStyle = pg; g.fill();
  g.strokeStyle = 'rgba(60,56,38,0.85)'; g.lineWidth = 1.4; g.stroke();
  g.beginPath(); g.moveTo(-hw-1, -hh+0.5); g.lineTo(hw+1, -hh+0.5); g.strokeStyle = 'rgba(85,80,55,0.5)'; g.lineWidth = 0.9; g.stroke();
  g.beginPath(); g.moveTo(-hw-1, hh-0.5); g.lineTo(hw+1, hh-0.5); g.strokeStyle = 'rgba(6,6,4,0.55)'; g.lineWidth = 0.9; g.stroke();
  [-hw+3, hw-3].forEach(px => { g.beginPath(); g.arc(px, 0, 2.5, 0, Math.PI*2); g.fillStyle = 'rgba(40,38,26,0.85)'; g.fill(); g.strokeStyle = 'rgba(65,62,42,0.7)'; g.lineWidth = 0.7; g.stroke(); });
  // drop-target window — softly lit at rest (like the reference), bright on hit, sinks when dropped
  const standing = sink < 0.5;
  const hot = fl > 0 && standing;
  const oy = sink * 5;
  g.globalAlpha = 1 - sink * 0.7;
  if (standing) ds(g, 0, 0, hot ? 20 : 9, hot ? 'rgba(255,165,20,0.65)' : 'rgba(255,228,150,0.5)');
  const wg = g.createLinearGradient(-12, -8, 12, 8);
  if (hot){ wg.addColorStop(0,'#ffe27a'); wg.addColorStop(0.5,'#f0a830'); wg.addColorStop(1,'#cf8418'); }
  else if (standing){ wg.addColorStop(0,'#fff6dc'); wg.addColorStop(1,'#e6cd8c'); }
  else { wg.addColorStop(0,'#1e1c16'); wg.addColorStop(1,'#141210'); }
  g.beginPath(); g.roundRect(-12, -8 + oy, 24, 16 - oy, 2.5); g.fillStyle = wg; g.fill();
  g.strokeStyle = standing ? 'rgba(206,176,108,0.9)' : 'rgba(44,42,28,0.9)'; g.lineWidth = 1.2; g.stroke(); cs(g);
  g.globalAlpha = 1;
  g.restore();
}

function drawSling(verts, n, fl){
  const [a, b2, c] = verts;
  g.save();
  ds(g, 3, 5, 10);
  g.beginPath(); g.moveTo(a[0], a[1]); g.lineTo(b2[0], b2[1]); g.lineTo(c[0], c[1]); g.closePath();
  g.fillStyle = 'rgba(0,0,0,0.4)'; g.fill(); cs(g);
  const cx = (a[0]+b2[0]+c[0])/3, cy = (a[1]+b2[1]+c[1])/3;
  const bg2 = g.createRadialGradient(cx, cy, 4, cx, cy, 60);
  bg2.addColorStop(0,'#323234'); bg2.addColorStop(0.5,'#252527'); bg2.addColorStop(1,'#141416');
  g.beginPath(); g.moveTo(a[0], a[1]); g.lineTo(b2[0], b2[1]); g.lineTo(c[0], c[1]); g.closePath();
  g.fillStyle = bg2; g.fill();
  g.strokeStyle = 'rgba(46,42,28,0.95)'; g.lineWidth = 2.5; g.stroke();
  // inner gold border
  const sh = (p) => [p[0] + (cx - p[0]) * 0.22, p[1] + (cy - p[1]) * 0.22];
  const ia = sh(a), ib = sh(b2), ic = sh(c);
  if (fl > 0) ds(g, 0, 0, fl * 0.5, C.gLt);
  g.beginPath(); g.moveTo(ia[0], ia[1]); g.lineTo(ib[0], ib[1]); g.lineTo(ic[0], ic[1]); g.closePath();
  g.strokeStyle = fl > 0 ? C.gLt : C.gold; g.lineWidth = 2; g.stroke(); cs(g);
  // lit rubber strip along the kicking face
  if (fl > 0){
    ds(g, 0, 0, fl * 0.45, '#fff');
    g.beginPath(); g.moveTo(a[0], a[1]); g.lineTo(b2[0], b2[1]);
    g.strokeStyle = `rgba(255,250,235,${Math.min(1, fl/30)})`; g.lineWidth = 3; g.stroke(); cs(g);
  }
  // arrow mark
  g.fillStyle = fl > 0 ? C.gLt : 'rgba(180,144,58,0.85)';
  g.font = 'bold 17px "Helvetica Neue"'; g.textAlign = 'center'; g.textBaseline = 'middle';
  g.save(); g.translate(cx + n.x * 4, cy + n.y * 4); g.fillText('A', 0, 0); g.restore();
  g.restore();
}

function drawFlipper(f){
  const v = f.body.vertices;
  ds(g, 2, 4, 9); g.beginPath(); g.moveTo(v[0].x, v[0].y); v.forEach(p => g.lineTo(p.x, p.y)); g.closePath(); g.fillStyle = 'rgba(0,0,0,0.32)'; g.fill(); cs(g);
  g.beginPath(); g.moveTo(v[0].x, v[0].y); v.forEach(p => g.lineTo(p.x, p.y)); g.closePath();
  const topY = Math.min(...v.map(p => p.y)), botY = Math.max(...v.map(p => p.y));
  const fg3 = g.createLinearGradient(0, topY-4, 0, botY+4);
  fg3.addColorStop(0,'#FAF5EB'); fg3.addColorStop(0.32,'#EEE7D3'); fg3.addColorStop(0.7,'#DDD5C0'); fg3.addColorStop(1,'#B8B09E');
  if (f.on && !tilted) ds(g, 0, 0, 10, C.gLt);
  g.fillStyle = fg3; g.fill(); cs(g);
  g.strokeStyle = 'rgba(92,84,65,0.85)'; g.lineWidth = 2; g.stroke();
  g.beginPath();
  if (f.left){ g.moveTo(v[0].x, v[0].y); g.lineTo(v[1].x, v[1].y); }
  else { g.moveTo(v[1].x, v[1].y); g.lineTo(v[2].x, v[2].y); }
  g.strokeStyle = 'rgba(255,252,240,0.65)'; g.lineWidth = 1.2; g.stroke();
  const cg2 = g.createRadialGradient(f.pivX-2, f.y-2, 0.5, f.pivX, f.y, 7);
  cg2.addColorStop(0,'#484848'); cg2.addColorStop(0.5,'#303030'); cg2.addColorStop(1,'#181818');
  ds(g, 1, 2, 4); g.beginPath(); g.arc(f.pivX, f.y, 7, 0, Math.PI*2); g.fillStyle = cg2; g.fill(); cs(g);
  g.strokeStyle = C.mid; g.lineWidth = 1.2; g.stroke();
  g.beginPath(); g.arc(f.pivX-2, f.y-2, 2.2, 0, Math.PI*2); g.fillStyle = 'rgba(115,110,88,0.44)'; g.fill();
}

function drawBall(b){
  const tr = b.plugin.trail;
  tr.push({ x: b.position.x, y: b.position.y });
  if (tr.length > 7) tr.shift();
  for (let i = 0; i < tr.length - 1; i++){
    const a = (i + 1) / tr.length * 0.18;
    g.beginPath(); g.arc(tr[i].x, tr[i].y, T.BALL_R * (0.4 + i / tr.length * 0.5), 0, Math.PI*2);
    g.fillStyle = `rgba(220,220,235,${a})`; g.fill();
  }
  const { x, y } = b.position, R = T.BALL_R;
  ds(g, 3, 5, 11, 'rgba(0,0,0,0.58)'); g.beginPath(); g.arc(x, y, R, 0, Math.PI*2); g.fillStyle = 'rgba(0,0,0,0.32)'; g.fill(); cs(g);
  const bg = g.createRadialGradient(x-4, y-4, 1, x, y, R);
  bg.addColorStop(0,'#ffffff'); bg.addColorStop(0.18,'#e8e8ee'); bg.addColorStop(0.5,'#c0c0c8'); bg.addColorStop(0.82,'#888892'); bg.addColorStop(1,'#585862');
  g.beginPath(); g.arc(x, y, R, 0, Math.PI*2); g.fillStyle = bg; g.fill(); g.strokeStyle = 'rgba(135,135,145,0.5)'; g.lineWidth = 0.8; g.stroke();
  const hg2 = g.createRadialGradient(x-5, y-5, 0, x-3, y-3, 6);
  hg2.addColorStop(0,'rgba(255,255,255,0.96)'); hg2.addColorStop(0.4,'rgba(255,255,255,0.5)'); hg2.addColorStop(1,'rgba(255,255,255,0)');
  g.beginPath(); g.arc(x-2, y-3, 6, 0, Math.PI*2); g.fillStyle = hg2; g.fill();
  g.beginPath(); g.arc(x+3, y-6, 2, 0, Math.PI*2); g.fillStyle = 'rgba(255,255,255,0.36)'; g.fill();
}

function drawPlunger(){
  const off = pull * T.PULL_MAX;
  const tipY = 641 + off, X = T.LANE_X;
  // rod (extends down through the apron, like the real cabinet)
  const knobY = 766 + off;
  const rodG = g.createLinearGradient(X-4, 0, X+4, 0);
  rodG.addColorStop(0,'#707078'); rodG.addColorStop(0.5,'#c8c8d0'); rodG.addColorStop(1,'#606068');
  g.fillStyle = rodG; g.fillRect(X-3.5, tipY + 10, 7, knobY - tipY - 10);
  // spring coils around the rod (compress as the rod is pulled)
  const coilTop = tipY + 18, coilBot = 752;
  const nC = 11;
  for (let i = 0; i < nC; i++){
    const t = i / (nC - 1);
    const cy2 = coilBot - (coilBot - coilTop) * t;
    g.strokeStyle = `rgba(${120+t*30|0},${112+t*26|0},${88+t*18|0},0.9)`; g.lineWidth = 2.4;
    g.beginPath(); g.ellipse(X, cy2, 12, 3.4, 0, 0, Math.PI*2); g.stroke();
  }
  // tip plate (touches the ball)
  ds(g, 1, 2, 4);
  const knG = g.createRadialGradient(X-3, tipY+5, 1, X, tipY+7, 12);
  knG.addColorStop(0,'#e8e8ec'); knG.addColorStop(0.5,'#b0b0b8'); knG.addColorStop(1,'#707078');
  g.beginPath(); g.roundRect(X-11, tipY, 22, 12, 5); g.fillStyle = knG; g.fill(); cs(g);
  g.strokeStyle = 'rgba(98,96,78,0.7)'; g.lineWidth = 1.2; g.stroke();
  // knob
  ds(g, 2, 3, 6);
  const kbG = g.createRadialGradient(X-4, knobY-4, 2, X, knobY, 14);
  kbG.addColorStop(0,'#f0f0f4'); kbG.addColorStop(0.5,'#b8b8c0'); kbG.addColorStop(1,'#62626a');
  g.beginPath(); g.arc(X, knobY, 13, 0, Math.PI*2); g.fillStyle = kbG; g.fill(); cs(g);
  g.strokeStyle = 'rgba(70,68,56,0.8)'; g.lineWidth = 1.2; g.stroke();
  g.beginPath(); g.arc(X-4, knobY-4, 4, 0, Math.PI*2); g.fillStyle = 'rgba(255,255,255,0.5)'; g.fill();
  // pull gauge + hint
  const laneBall = state === 'play' && balls.some(b => b.plugin.inLane && b.position.y > 600);
  if (laneBall){
    if (pull > 0){
      const bh = pull * 104;
      g.beginPath(); g.roundRect(PR + 11, 500, 7, 108, 3); g.fillStyle = 'rgba(7,7,5,0.9)'; g.fill();
      g.strokeStyle = 'rgba(62,56,38,0.8)'; g.lineWidth = 1; g.stroke();
      const pr2 = 158 + pull * 88 | 0, pg2 = 148 - pull * 94 | 0;
      ds(g, 0, 0, 8, `rgb(${pr2},${pg2},18)`);
      g.fillStyle = `rgb(${pr2},${pg2},18)`;
      g.beginPath(); g.roundRect(PR + 12.5, 502 + 104 - bh, 4, bh, 2); g.fill(); cs(g);
    } else if (Math.sin(now() * 0.005) > 0){
      g.save(); g.translate(W - 11, 470); g.rotate(Math.PI/2);
      ds(g, 0, 0, 6, C.gLt);
      g.fillStyle = C.gLt; g.font = 'bold 9px "Helvetica Neue"'; g.textAlign = 'center'; g.textBaseline = 'middle';
      g.fillText('PULL ▼', 0, 0); cs(g); g.restore();
    }
  }
}

// ════════════════════════════════════════════
// MAIN DRAW
// ════════════════════════════════════════════
function draw(){
  g.setTransform(SC, 0, 0, SC, 0, 0);
  if (shakeT > 0){
    const k = shakeT / 10;
    g.translate((Math.random()-.5) * 6 * k, (Math.random()-.5) * 7 * k);
  }
  g.clearRect(-10, -10, W+20, H+20);
  g.fillStyle = '#070707'; g.fillRect(0, 0, W, H);
  if (bgReady) g.drawImage(bgImg, 0, 0, W, H);

  const tNow = now();

  // Orbit lock dots
  for (let i = 0; i < 3; i++){
    const lit = i < locks;
    if (lit) ds(g, 0, 0, 12, C.gLt);
    g.beginPath(); g.arc(PR+20+i*9, PT+126, 4, 0, Math.PI*2);
    g.fillStyle = lit ? C.gLt : 'rgba(16,13,9,0.96)'; g.fill();
    g.strokeStyle = lit ? C.gLt : C.gold; g.lineWidth = 0.9; g.stroke(); cs(g);
    if (lit){ g.beginPath(); g.arc(PR+18+i*9, PT+124, 1.5, 0, Math.PI*2); g.fillStyle = 'rgba(255,255,255,0.48)'; g.fill(); }
  }

  // Bank indicator triangles (lit = target dropped)
  for (let i = 0; i < 3; i++){
    [[PL+40, tb.vbT[i]], [PR-40, tb.sbT[i]]].forEach(([tx, tg]) => {
      const ty = PB-248+i*32, lit = tg.plugin.dropped;
      if (lit) ds(g, 0, 0, 12, C.gLt);
      g.beginPath(); g.moveTo(tx, ty-10); g.lineTo(tx+13, ty+8); g.lineTo(tx-13, ty+8); g.closePath();
      g.fillStyle = lit ? 'rgba(208,162,38,0.88)' : 'rgba(120,105,48,0.22)'; g.fill();
      g.strokeStyle = lit ? C.gLt : C.gDk; g.lineWidth = 1.2; g.stroke(); cs(g);
    });
  }

  // Targets, bumpers
  tb.vbT.forEach(drawTarget); tb.sbT.forEach(drawTarget);
  const boosted = tNow < sysBoostUntil;
  tb.bumps.forEach(b => drawBumper(b.position.x, b.position.y, b.plugin.fl / 64, boosted));

  // Slingshots
  drawSling(T.SLING_L, T.SLING_NL, tb.slingL.plugin.fl);
  drawSling(T.SLING_R, T.SLING_NR, tb.slingR.plugin.fl);

  // Core mode pills
  MODES.forEach((name, i) => {
    const y = CMY0 + i*CMDY, fl = cmFl[i] / 64;
    const isAct = i === mode, isDone = i < mode, ledX = CMX - 62;
    if ((isAct || isDone) && fl > 0) ds(g, 0, 0, 14, C.gLt);
    const lg2 = g.createRadialGradient(ledX-1.5, y-1.5, 0.5, ledX, y, 5.5);
    if (isDone){ lg2.addColorStop(0, C.gLt); lg2.addColorStop(1, C.gold); }
    else if (isAct){ const c = fl > 0 ? C.gLt : 'rgba(192,148,26,0.85)'; lg2.addColorStop(0, c); lg2.addColorStop(1, C.gDk); }
    else { lg2.addColorStop(0, 'rgba(38,36,24,0.95)'); lg2.addColorStop(1, 'rgba(22,20,12,0.95)'); }
    g.beginPath(); g.arc(ledX, y, 5.5, 0, Math.PI*2); g.fillStyle = lg2; g.fill(); g.strokeStyle = 'rgba(48,44,28,0.85)'; g.lineWidth = 1; g.stroke(); cs(g);
    if (isDone || isAct){ g.beginPath(); g.arc(ledX-2, y-2, 2, 0, Math.PI*2); g.fillStyle = 'rgba(255,255,255,0.44)'; g.fill(); }
    if (isAct && fl > 0) ds(g, 0, 2, 13, C.gGlow);
    g.fillStyle = isDone ? 'rgba(136,106,18,0.62)' : isAct ? `rgba(${108+fl*100|0},${80+fl*46|0},12,${0.84+fl*0.14})` : 'rgba(11,11,9,0.92)';
    g.beginPath(); g.roundRect(CMX-50, y-9, 100, 18, 9); g.fill();
    g.strokeStyle = isAct ? C.gold : isDone ? 'rgba(128,98,18,0.58)' : 'rgba(52,48,32,0.85)'; g.lineWidth = 1.4; g.stroke();
    g.beginPath(); g.moveTo(CMX-40, y-8); g.lineTo(CMX+40, y-8); g.strokeStyle = 'rgba(255,255,255,0.06)'; g.lineWidth = 1; g.stroke(); cs(g);
    g.fillStyle = isDone ? C.gLt : isAct ? C.gLt : 'rgba(135,124,88,0.88)'; g.font = 'bold 9px "Helvetica Neue"'; g.textAlign = 'center'; g.textBaseline = 'middle'; g.fillText(name, CMX, y);
    if (isDone){ g.fillStyle = C.gLt; g.font = 'bold 10px "Helvetica Neue"'; g.textAlign = 'left'; g.fillText('✓', CMX+44, y); }
    if (isAct){
      for (let d = 0; d < MNEED; d++){
        const dl = d < mhits;
        if (dl) ds(g, 0, 0, 8, C.gLt);
        const pg2 = g.createRadialGradient(CMX-4+d*8, y+15, 0.5, CMX-4+d*8, y+16, 4.5);
        if (dl){ pg2.addColorStop(0,'#fffac0'); pg2.addColorStop(0.3,C.gLt); pg2.addColorStop(1,C.gold); }
        else { pg2.addColorStop(0,'rgba(48,46,30,0.9)'); pg2.addColorStop(1,'rgba(26,24,14,0.9)'); }
        g.beginPath(); g.arc(CMX-4+d*8, y+16, 4.5, 0, Math.PI*2); g.fillStyle = pg2; g.fill(); g.strokeStyle = 'rgba(52,50,32,0.8)'; g.lineWidth = 0.9; g.stroke(); cs(g);
        if (dl){ g.beginPath(); g.arc(CMX-6+d*8, y+14, 1.5, 0, Math.PI*2); g.fillStyle = 'rgba(255,255,255,0.52)'; g.fill(); }
      }
    }
  });

  // SHOOT AGAIN lamp (lit while ball save active)
  {
    const saLit = state === 'play' && tNow < saveUntil && Math.sin(tNow * 0.012) > -0.3;
    const sx = T.SAX, sy = T.SAY;
    if (saLit) ds(g, 0, 0, 18, C.gLt);
    g.beginPath(); g.moveTo(sx, sy-20); g.lineTo(sx+24, sy); g.lineTo(sx, sy+20); g.lineTo(sx-24, sy); g.closePath();
    g.fillStyle = saLit ? 'rgba(185,145,35,0.5)' : C.gun2; g.fill();
    g.strokeStyle = saLit ? C.gLt : C.gold; g.lineWidth = 1.8; g.stroke(); cs(g);
    g.fillStyle = saLit ? '#ffe9a8' : 'rgba(172,150,82,0.95)'; g.font = 'bold 6.5px "Helvetica Neue"'; g.textAlign = 'center'; g.textBaseline = 'middle';
    g.fillText('SHOOT', sx, sy-5); g.fillText('AGAIN', sx, sy+5);
  }

  // Flippers, plunger, balls
  drawFlipper(LF); drawFlipper(RF);
  drawPlunger();
  balls.forEach(drawBall);

  // Particles
  parts = parts.filter(p => p.life > 0);
  parts.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.11; p.life--;
    const a = p.life / 48;
    g.beginPath(); g.arc(p.x, p.y, p.r * a + 0.3, 0, Math.PI*2);
    g.fillStyle = p.col + (Math.floor(Math.max(0, Math.min(1, a)) * 215).toString(16).padStart(2, '0')); g.fill();
  });

  // Float texts
  ftxts = ftxts.filter(f => f.life > 0);
  ftxts.forEach(f => {
    f.y += f.vy; f.life--;
    g.globalAlpha = Math.min(1, f.life / 14);
    g.shadowColor = f.col; g.shadowBlur = 8; g.fillStyle = f.col;
    g.font = `bold ${f.sz}px "Helvetica Neue"`; g.textAlign = 'center'; g.textBaseline = 'middle';
    g.fillText(f.t, f.x, f.y);
    g.shadowBlur = 0; g.globalAlpha = 1;
  });

  drawHUD(tNow);
  if (tilted) drawTilt(tNow);
  if (state === 'title') drawTitle(tNow);
  if (state === 'over') drawGameOver(tNow);
}

function drawHUD(tNow){
  g.fillStyle = 'rgba(4,4,3,0.83)'; g.beginPath(); g.roundRect(4, 4, W-8, 22, 5); g.fill();
  // sound icon
  g.strokeStyle = muted ? 'rgba(140,120,80,0.5)' : C.gLt; g.fillStyle = g.strokeStyle; g.lineWidth = 1.4;
  g.beginPath(); g.moveTo(12, 13); g.lineTo(16, 13); g.lineTo(21, 9); g.lineTo(21, 21); g.lineTo(16, 17); g.lineTo(12, 17); g.closePath(); g.fill();
  if (muted){
    g.beginPath(); g.moveTo(24, 11); g.lineTo(31, 19); g.moveTo(31, 11); g.lineTo(24, 19); g.stroke();
  } else {
    g.beginPath(); g.arc(22, 15, 5.5, -0.9, 0.9); g.stroke();
    g.beginPath(); g.arc(22, 15, 9, -0.9, 0.9); g.stroke();
  }
  g.textBaseline = 'middle';
  g.fillStyle = 'rgba(165,148,100,0.95)'; g.font = 'bold 9px "Helvetica Neue"'; g.textAlign = 'left';
  g.fillText('BALL ' + Math.min(ballNum, 3) + '/3', 40, 15);
  ds(g, 0, 0, 5, C.gLt); g.fillStyle = C.gLt; g.font = 'bold 13px "Helvetica Neue"'; g.textAlign = 'center';
  g.fillText(score.toLocaleString('en-US'), PCX, 15); cs(g);
  const m = multNow();
  if (m > 1 && state === 'play'){
    g.fillStyle = C.gGlow; g.font = 'bold 10px "Helvetica Neue"'; g.textAlign = 'left';
    g.fillText('×' + m, PCX + 62, 15);
  }
  g.fillStyle = 'rgba(165,148,100,0.95)'; g.font = 'bold 9px "Helvetica Neue"'; g.textAlign = 'right';
  g.fillText('BEST ' + hi.toLocaleString('en-US'), W-10, 15);
  // mode progress strip
  g.fillStyle = 'rgba(4,4,3,0.74)'; g.beginPath(); g.roundRect(PCX-90, 27, 180, 13, 3); g.fill();
  if (mhits > 0){
    ds(g, 0, 0, 5, C.gLt); g.fillStyle = C.gLt;
    g.beginPath(); g.roundRect(PCX-89, 28, (mhits/MNEED)*178, 11, 2); g.fill(); cs(g);
  }
  g.fillStyle = 'rgba(175,158,108,0.92)'; g.font = 'bold 8px "Helvetica Neue"'; g.textAlign = 'center';
  g.fillText(MODES[mode], PCX, 33.5);
}

function drawTilt(tNow){
  if (Math.sin(tNow * 0.012) > -0.2){
    ds(g, 0, 0, 22, '#ff2020');
    g.fillStyle = '#ff3030'; g.font = 'bold 46px "Helvetica Neue"'; g.textAlign = 'center'; g.textBaseline = 'middle';
    g.fillText('T I L T', W/2, 330); cs(g);
  }
}

function drawTitle(tNow){
  g.fillStyle = 'rgba(3,3,2,0.88)'; g.fillRect(0, 0, W, H);
  g.save(); g.translate(W/2, 200);
  ds(g, 0, 0, 22, C.gLt); g.strokeStyle = C.gLt; g.lineWidth = 3.5;
  g.beginPath(); g.moveTo(0, -52); g.lineTo(48, 38); g.lineTo(-48, 38); g.closePath(); g.stroke();
  g.beginPath(); g.moveTo(-22, 8); g.lineTo(22, 8); g.stroke(); cs(g); g.restore();
  ds(g, 0, 0, 14, C.gLt);
  g.fillStyle = C.gLt; g.font = 'bold 30px "Helvetica Neue"'; g.textAlign = 'center'; g.textBaseline = 'middle';
  g.fillText('AURORA', W/2, 300);
  g.font = '13px "Helvetica Neue"'; g.fillText('I N D U S T R I E S', W/2, 326); cs(g);
  g.fillStyle = 'rgba(170,152,102,0.95)'; g.font = 'bold 16px "Helvetica Neue"';
  g.fillText('— PINBALL —', W/2, 362);
  const lines = [
    ['左半分タップ', '左フリッパー'],
    ['右半分タップ', '右フリッパー'],
    ['右レーンを下にドラッグ→離す', 'プランジャー発射'],
    ['下パネルを上にフリック', 'ナッジ(3回でTILT)'],
  ];
  lines.forEach(([a, b2], i) => {
    const y = 420 + i * 30;
    g.fillStyle = C.gLt; g.font = 'bold 12px "Helvetica Neue"'; g.textAlign = 'right';
    g.fillText(a, W/2 + 30, y);
    g.fillStyle = 'rgba(150,134,92,0.9)'; g.font = '11px "Helvetica Neue"'; g.textAlign = 'left';
    g.fillText(b2, W/2 + 42, y);
  });
  g.textAlign = 'center';
  g.fillStyle = 'rgba(150,134,92,0.85)'; g.font = '10px "Helvetica Neue"';
  g.fillText('ORBIT×3でマルチボール ／ ELEVATE到達で3X', W/2, 555);
  if (Math.sin(tNow * 0.004) > 0){
    ds(g, 0, 0, 10, C.gLt); g.fillStyle = C.gLt; g.font = 'bold 17px "Helvetica Neue"';
    g.fillText('TAP TO START', W/2, 610); cs(g);
  }
  if (hi > 0){
    g.fillStyle = 'rgba(136,122,76,0.92)'; g.font = '11px "Helvetica Neue"';
    g.fillText('BEST: ' + hi.toLocaleString('en-US'), W/2, 650);
  }
}

function drawGameOver(tNow){
  g.fillStyle = 'rgba(3,3,2,0.93)'; g.fillRect(0, 0, W, H);
  const gox = W/2-155, goy = H/2-162, gow = 310, goh = 324;
  ds(g, 0, 0, 38, 'rgba(178,138,38,0.33)');
  const panG = g.createLinearGradient(gox, goy, gox+gow, goy+goh);
  panG.addColorStop(0,'#1e1e20'); panG.addColorStop(1,'#141416');
  g.fillStyle = panG; g.beginPath(); g.roundRect(gox, goy, gow, goh, 14); g.fill(); cs(g);
  ds(g, 0, 0, 18, C.gold); g.strokeStyle = C.gold; g.lineWidth = 2; g.beginPath(); g.roundRect(gox, goy, gow, goh, 14); g.stroke(); cs(g);
  g.strokeStyle = 'rgba(75,68,42,0.42)'; g.lineWidth = 1; g.beginPath(); g.roundRect(gox+6, goy+6, gow-12, goh-12, 10); g.stroke();
  g.save(); g.translate(W/2, H/2-122); ds(g, 0, 0, 14, C.gLt); g.strokeStyle = C.gLt; g.lineWidth = 2.5;
  g.beginPath(); g.moveTo(0,-28); g.lineTo(26,20); g.lineTo(-26,20); g.closePath(); g.stroke();
  g.beginPath(); g.moveTo(-12,4); g.lineTo(12,4); g.stroke(); cs(g); g.restore();
  ds(g, 0, 0, 15, C.gLt); g.fillStyle = C.gLt; g.font = 'bold 32px "Helvetica Neue"'; g.textAlign = 'center'; g.textBaseline = 'middle';
  g.fillText('GAME OVER', W/2, H/2-78); cs(g);
  g.fillStyle = 'rgba(160,142,90,0.88)'; g.font = 'bold 11px "Helvetica Neue"'; g.fillText('AURORA INDUSTRIES', W/2, H/2-48);
  g.strokeStyle = 'rgba(78,70,44,0.38)'; g.lineWidth = 1; g.beginPath(); g.moveTo(W/2-85, H/2-35); g.lineTo(W/2+85, H/2-35); g.stroke();
  g.fillStyle = C.gLt; g.font = 'bold 26px "Helvetica Neue"'; g.fillText('SCORE: ' + score.toLocaleString('en-US'), W/2, H/2-14);
  g.fillStyle = 'rgba(136,122,76,0.92)'; g.font = '17px "Helvetica Neue"'; g.fillText('BEST: ' + hi.toLocaleString('en-US'), W/2, H/2+18);
  g.fillStyle = 'rgba(120,108,68,0.82)'; g.font = '11px "Helvetica Neue"'; g.fillText('MODE: ' + MODES[Math.min(mode, 4)], W/2, H/2+50);
  if (Math.sin(tNow * 0.004) > 0){
    ds(g, 0, 0, 10, C.gLt); g.fillStyle = C.gLt; g.font = 'bold 14px "Helvetica Neue"';
    g.fillText('TAP TO PLAY AGAIN', W/2, H/2+92); cs(g);
  }
}

// ════════════════════════════════════════════
// MAIN LOOP (fixed timestep accumulator)
// ════════════════════════════════════════════
let last = performance.now(), acc = 0;
function loop(ts){
  let dt = Math.min(ts - last, 50);
  last = ts; acc += dt;
  if (kbPull) pull = Math.min(pull + dt / 900, 1);
  let n = 0;
  while (acc >= STEP && n < 8){ physStep(); acc -= STEP; n++; }
  if (n === 8) acc = 0;
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
