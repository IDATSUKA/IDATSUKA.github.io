<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AURORA PINBALL">
<meta name="theme-color" content="#050505">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<title>AURORA INDUSTRIES — PINBALL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#050505;overflow:hidden;
  touch-action:none;-webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
  display:flex;align-items:center;justify-content:center}
canvas{display:block;touch-action:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script src="matter.min.js"></script>
<script src="table.js"></script>
<script>
'use strict';
// roundRect polyfill (iOS < 16.4)
if (typeof CanvasRenderingContext2D !== 'undefined' && !CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r){
    if (typeof r === 'number') r = [r, r, r, r];
    else if (Array.isArray(r)){ if (r.length === 1) r = [r[0], r[0], r[0], r[0]]; }
    else r = [0, 0, 0, 0];
    const m = Math.min(Math.abs(w) / 2, Math.abs(h) / 2);
    r = r.map(v => Math.min(v, m));
    this.moveTo(x + r[0], y);
    this.arcTo(x + w, y, x + w, y + h, r[1]);
    this.arcTo(x + w, y + h, x, y + h, r[2]);
    this.arcTo(x, y + h, x, y, r[3]);
    this.arcTo(x, y, x + w, y, r[0]);
    this.closePath();
    return this;
  };
}
const T = PinTable, W = T.W, H = T.H;
const { Engine, World, Body } = Matter;

// PWA: offline cache + installability
if (typeof navigator !== 'undefined' && 'serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ════════════════════════════════════════════
// CANVAS (retina-sharp)
// ════════════════════════════════════════════
const cv = document.getElementById('c');
const g = cv.getContext('2d');
let SC = 1;
function resize(){
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  const d = Math.min(window.devicePixelRatio || 1, 3);
  SC = s * d;
  cv.width = Math.round(W * SC); cv.height = Math.round(H * SC);
  cv.style.width = W * s + 'px'; cv.style.height = H * s + 'px';
}
resize();
window.addEventListener('resize', resize);

// ════════════════════════════════════════════
// PALETTE
// ════════════════════════════════════════════
const C = {
  gold:'#B8903A', gLt:'#D4AA50', gDk:'#7A6025', gGlow:'#E0B850',
  gun:'#181818', gun2:'#222224', gun3:'#2E2E30', mid:'#484848',
  sil:'#A0A0AA', silLt:'#D0D0D8',
  c0:'#f8f8f8', c1:'#d0d0d6', c2:'#909098', c3:'#404048',
};
const MODES = ['INITIATE','ASSEMBLE','CALIBRATE','INNOVATE','ELEVATE'];
const MNEED = 3;
const INFO_Y = T.INFO_Y, INFO_H = H - INFO_Y;
const PL=T.PL, PR=T.PR, PT=T.PT, PB=T.PB, PCX=T.PCX,
      ACX=T.ACX, ACY=T.ACY, ARX=T.ARX, ARY=T.ARY,
      CMX=T.CMX, CMY0=T.CMY0, CMDY=T.CMDY, BR=T.BR;

// ════════════════════════════════════════════
// AUDIO (synthesized, no assets)
// ════════════════════════════════════════════
let muted = localStorage.getItem('aurora_mute') === '1';
let AC = null;
function ac(){
  if (muted) return null;
  if (!AC){ const A = window.AudioContext || window.webkitAudioContext; if (!A) return null; AC = new A(); }
  if (AC.state === 'suspended') AC.resume();
  return AC;
}
function beep(f0, f1, dur, type, vol, delay){
  const a = ac(); if (!a) return;
  const t0 = a.currentTime + (delay || 0);
  const o = a.createOscillator(), gn = a.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(Math.max(f0,1), t0);
  o.frequency.exponentialRampToValueAtTime(Math.max(f1,1), t0 + dur);
  gn.gain.setValueAtTime(vol || 0.3, t0);
  gn.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.connect(gn); gn.connect(a.destination);
  o.start(t0); o.stop(t0 + dur + 0.03);
}
function nz(dur, vol, delay){
  const a = ac(); if (!a) return;
  const t0 = a.currentTime + (delay || 0);
  const n = Math.floor(a.sampleRate * dur);
  const buf = a.createBuffer(1, n, a.sampleRate), d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
  const s = a.createBufferSource(); s.buffer = buf;
  const gn = a.createGain(); gn.gain.value = vol;
  s.connect(gn); gn.connect(a.destination); s.start(t0);
}
const arp = (ns, dur, type, vol, gap) => ns.forEach((f, i) => beep(f, f, dur, type, vol, i * gap));
const sfx = {
  flip: () => beep(170, 120, .05, 'square', .16),
  bump: () => { beep(850, 420, .09, 'triangle', .5); nz(.03, .22); },
  sling: () => beep(430, 290, .07, 'square', .28),
  target: () => { beep(240, 160, .09, 'square', .38); nz(.04, .18); },
  bank: () => arp([660, 880, 1175], .12, 'square', .26, .09),
  mode: () => arp([523, 659, 784, 1047], .11, 'square', .24, .08),
  complete: () => arp([523, 659, 784, 1047, 1319, 1568], .14, 'square', .27, .09),
  orbit: () => beep(600, 1100, .14, 'sine', .38),
  lock: () => arp([392, 523], .1, 'square', .3, .09),
  mball: () => arp([392, 523, 659, 784, 1047], .16, 'sawtooth', .2, .1),
  launch: p => { nz(.12, .35); beep(90, 55, .18, 'sine', .45 + p * .3); },
  drain: () => beep(280, 55, .5, 'sawtooth', .28),
  save: () => arp([784, 1047], .1, 'square', .3, .08),
  nudge: () => beep(95, 60, .07, 'sine', .5),
  tilt: () => beep(220, 70, .6, 'square', .32),
  over: () => arp([523, 440, 349, 262], .22, 'sawtooth', .22, .18),
};

// ════════════════════════════════════════════
// PHYSICS WORLD + GAME STATE
// ════════════════════════════════════════════
const tb = T.build(Matter);
const LF = tb.LF, RF = tb.RF;

let state = 'title';            // 'title' | 'play' | 'over'
let score = 0, ballNum = 1;
let hi = +localStorage.getItem('aurora_hi2') || 0;
let mode = 0, mhits = 0;
let locks = 0;
let saveUntil = 0, sysBoostUntil = 0, x3Until = 0;
let tilted = false, nudges = [];
let pull = 0;
let balls = [];
let parts = [], ftxts = [];
let cmFl = [0,0,0,0,0], shakeT = 0;
const now = () => performance.now();

function multNow(){
  let m = 1;
  if (now() < x3Until) m *= 3;
  if (balls.length > 1) m *= 2;
  return m;
}
function pts(p, pos){
  if (state !== 'play' || tilted) return;
  const v = p * multNow();
  score += v;
  if (score > hi){ hi = score; localStorage.setItem('aurora_hi2', hi); }
  if (p >= 100 && pos) ft('+' + v, pos, C.gLt, 13);
}
function ft(t, pos, col, sz){ ftxts.push({ t, x: pos.x, y: Math.max(pos.y, T.IMG_Y + 50), vy: -0.88, col: col || C.gLt, sz: sz || 13, life: 72 }); }
function burst(p, col, n){
  for (let i = 0; i < n; i++){
    const a = Math.random() * Math.PI * 2, s = 1.2 + Math.random() * 3;
    parts.push({ x: p.x, y: p.y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 22 + Math.random() * 18, col, r: 1 + Math.random() * 2.2 });
  }
}

// ── Balls ─────────────────────────────────────────────
function newBallInLane(noSave){
  const b = tb.addBall(T.LANE_X, T.PH_Y - 12);
  b.plugin.inLane = true; b.plugin.fromPlunger = true; b.plugin.trail = [];
  b.plugin.noSave = !!noSave;   // a save-returned ball doesn't re-arm the saver
  balls.push(b);
}
function rampBall(delay){
  setTimeout(() => {
    if (state !== 'play') return;
    const p0 = T.bez(0);
    const b = tb.addBall(p0.x, p0.y);
    b.plugin.trail = [];
    b.plugin.guide = { t: 0, rate: 3.2 };
    b.collisionFilter = { category: 1, mask: 0 };
    balls.push(b);
  }, delay);
}
function launchFromPlunger(power){
  const b = balls.find(x => x.plugin.inLane && x.position.y > T.PH_Y - 60);
  if (!b) return;
  Body.setVelocity(b, { x: 0, y: -(T.LAUNCH_MIN + T.LAUNCH_RNG * power) });
  sfx.launch(power);
}
function removeBall(b){
  const i = balls.indexOf(b);
  if (i >= 0) balls.splice(i, 1);
  tb.removeBall(b);
}
function onDrain(b){
  burst(b.position, '#666', 14);
  removeBall(b);
  sfx.drain();
  if (balls.length > 0){
    if (balls.length === 1) ft('MULTIBALL END', { x: PCX, y: 320 }, C.gLt, 15);
    return;
  }
  if (now() < saveUntil && !tilted){
    saveUntil = 0;
    ft('BALL SAVED!', { x: PCX, y: 340 }, C.gLt, 20);
    sfx.save();
    setTimeout(() => { if (state === 'play') newBallInLane(true); }, 600);
    return;
  }
  endOfBall();
}
function endOfBall(){
  tilted = false; nudges = []; saveUntil = 0; sysBoostUntil = 0;
  if (ballNum >= 3){
    state = 'over';
    sfx.over();
  } else {
    ballNum++;
    setTimeout(() => { if (state === 'play') newBallInLane(); }, 900);
  }
}
function startGame(){
  balls.slice().forEach(removeBall);
  [...tb.vbT, ...tb.sbT].forEach(t => {
    t.plugin.dropped = false; t.plugin.sink = 0; t.plugin.fl = 0; t.plugin.cd = 0;
    t.collisionFilter = { category: 4, mask: 1 };
  });
  tb.bumps.forEach(b => { b.plugin.fl = 0; b.plugin.cd = 0; });
  score = 0; ballNum = 1; mode = 0; mhits = 0; locks = 0;
  saveUntil = 0; sysBoostUntil = 0; x3Until = 0;
  tilted = false; nudges = []; pull = 0;
  parts = []; ftxts = []; cmFl = [0,0,0,0,0];
  state = 'play';
  newBallInLane();
}

// ── Feature events (from physics scan) ────────────────
function modeHit(pos){
  mhits++; pts(500, pos); cmFl[mode] = 64;
  if (mhits >= MNEED){
    mhits = 0;
    if (mode < 4){
      mode++;
      ft(MODES[mode] + '!', { x: PCX, y: CMY0 + mode * CMDY - 20 }, C.gLt, 22);
      sfx.mode();
      if (mode === 4){
        x3Until = now() + 20000;
        ft('3X SCORING!', { x: PCX, y: 300 }, C.gLt, 20);
      }
    } else {
      pts(8000, { x: PCX, y: 440 });
      ft('AURORA COMPLETE!', { x: PCX, y: 425 }, C.gLt, 18);
      sfx.complete();
      mode = 0;
    }
  }
}
function startMultiball(){
  ft('MULTIBALL!', { x: PCX, y: 300 }, C.gLt, 24);
  sfx.mball();
  rampBall(200); rampBall(1300);
}
function onEvent(type, d, pos){
  if (state !== 'play') return;
  if (type === 'bumper'){
    pts(now() < sysBoostUntil ? 200 : 100, pos);
    burst(pos, C.gLt, 10); sfx.bump();
  } else if (type === 'sling'){
    pts(10, null); sfx.sling();
  } else if (type === 'target'){
    const arr = d.bank ? tb.sbT : tb.vbT;
    const t = arr[d.i];
    t.plugin.dropped = true; t.plugin.fl = 52;
    t.collisionFilter = { category: 4, mask: 0 };
    pts(d.bank ? 500 : 300, pos);
    burst(pos, C.gLt, 8); sfx.target();
    if (arr.every(x => x.plugin.dropped)){
      if (d.bank){
        pts(2000, { x: PR - 90, y: 300 });
        ft('SYSTEMS BANK!', { x: PCX, y: 300 }, C.gLt, 18);
        sysBoostUntil = now() + 10000;
      } else {
        pts(1500, { x: PL + 90, y: 300 });
        ft('VECTOR BANK!', { x: PCX, y: 300 }, C.gLt, 18);
      }
      sfx.bank();
      modeHit({ x: CMX, y: CMY0 + mode * CMDY });
      setTimeout(() => arr.forEach(x => {
        x.plugin.dropped = false;
        x.collisionFilter = { category: 4, mask: 1 };
      }), 1100);
    }
  } else if (type === 'mode'){
    if (d === mode) modeHit(pos);
    else if (d < mode) pts(80, pos);
  } else if (type === 'orbit'){
    pts(250, pos); sfx.orbit();
    locks++;
    if (locks >= 3){
      locks = 0;
      startMultiball();
    } else {
      ft('LOCK ' + locks, { x: PR - 60, y: 200 }, C.gLt, 15);
      sfx.lock();
    }
  }
}

// ── Nudge / tilt ──────────────────────────────────────
function doNudge(){
  if (state !== 'play' || tilted) return;
  sfx.nudge(); shakeT = 10;
  const t = now();
  nudges.push(t);
  nudges = nudges.filter(x => t - x < 1800);
  balls.forEach(b => {
    if (b.plugin.guide || b.plugin.inLane) return;
    Body.setVelocity(b, { x: b.velocity.x + (Math.random() - .5) * 1.8, y: b.velocity.y - 2.4 });
  });
  if (nudges.length >= 3){
    tilted = true; nudges = [];
    LF.on = RF.on = false;
    ft('TILT!', { x: PCX, y: 340 }, '#ff3030', 26);
    sfx.tilt();
  }
}

// ════════════════════════════════════════════
// FIXED-STEP PHYSICS (120 Hz — correct on ProMotion displays)
// ════════════════════════════════════════════
const STEP = 1000 / 120;
function physStep(){
  if (state !== 'play') return;
  T.stepFlippers(tb, tilted);

  for (const b of balls.slice()){
    const pl = b.plugin;
    if (pl.guide){
      pl.guide.t += pl.guide.rate * STEP / 1000;
      if (pl.guide.t >= 1){
        const tan = T.bezTan(1);
        const sp = Math.max(4, Math.min(pl.guide.rate * T.RAMP_LEN / 60, 11));
        const p1 = T.bez(1);
        Body.setPosition(b, p1);
        b.collisionFilter = { category: 1, mask: 0xFFFF };
        Body.setVelocity(b, { x: tan.x * sp, y: tan.y * sp });
        pl.guide = null;
        if (pl.inLane){
          pl.inLane = false;
          if (pl.fromPlunger){ pl.fromPlunger = false; if (!pl.noSave) saveUntil = now() + 6000; }
        }
      } else {
        Body.setPosition(b, T.bez(pl.guide.t));
        Body.setVelocity(b, { x: 0, y: 0 });
      }
    } else if (pl.inLane && b.velocity.y < 0 && b.position.y < T.GUIDE_Y && b.position.x > PR + 6){
      const vTop = -b.velocity.y;
      pl.guide = { t: 0, rate: Math.max(1.1, Math.min(vTop * 60 / T.RAMP_LEN, 6)) };
      b.collisionFilter = { category: 1, mask: 0 };
    }
  }

  // scan BEFORE the solver so impact velocities are still unresolved
  T.scan(tb, balls, onEvent);
  Engine.update(tb.eng, STEP);

  for (const b of balls.slice()){
    if (!T.clampBall(tb, b)){ onDrain(b); continue; }
    if (b.position.y > PB + 14 && b.position.x < PR + 6) onDrain(b);
  }

  // visual timers
  tb.bumps.forEach(b => { if (b.plugin.fl > 0) b.plugin.fl--; });
  [tb.slingL, tb.slingR].forEach(s => { if (s.plugin.fl > 0) s.plugin.fl--; });
  [...tb.vbT, ...tb.sbT].forEach(t => {
    if (t.plugin.fl > 0) t.plugin.fl--;
    const tgt = t.plugin.dropped ? 1 : 0;
    t.plugin.sink += (tgt - t.plugin.sink) * 0.12;
  });
  cmFl = cmFl.map(v => v > 0 ? v - 1 : 0);
  if (shakeT > 0) shakeT--;
}

// ════════════════════════════════════════════
// INPUT
// ════════════════════════════════════════════
const touches = new Map();
function lpos(e){
  const r = cv.getBoundingClientRect();
  return { x: (e.clientX - r.left) / (r.width / W), y: (e.clientY - r.top) / (r.height / H) };
}
function pDown(id, x, y){
  ac(); // unlock audio on first gesture
  if (state === 'title'){ startGame(); return; }
  if (state === 'over'){ startGame(); return; }
  if (x < 38 && y < 32){ muted = !muted; localStorage.setItem('aurora_mute', muted ? '1' : '0'); return; }
  if (x > PR + 6 && balls.some(b => b.plugin.inLane && b.position.y > T.PH_Y - 60)){
    touches.set(id, { role: 'plunger', sy: y }); return;
  }
  if (y >= INFO_Y){ touches.set(id, { role: 'nudge', sy: y, used: false }); return; }
  if (x < W / 2){ if (!LF.on && !tilted) sfx.flip(); LF.on = true; touches.set(id, { role: 'L' }); }
  else { if (!RF.on && !tilted) sfx.flip(); RF.on = true; touches.set(id, { role: 'R' }); }
}
function pMove(id, x, y){
  const t = touches.get(id); if (!t) return;
  if (t.role === 'plunger'){ pull = Math.max(0, Math.min((y - t.sy) / 130, 1)); }
  else if (t.role === 'nudge' && !t.used && t.sy - y > 24){ t.used = true; doNudge(); }
}
function pUp(id){
  const t = touches.get(id); if (!t) return;
  touches.delete(id);
  if (t.role === 'L') LF.on = false;
  else if (t.role === 'R') RF.on = false;
  else if (t.role === 'plunger'){
    if (pull > 0.04) launchFromPlunger(pull);
    pull = 0;
  }
}
cv.addEventListener('touchstart', e => { e.preventDefault(); for (const t of e.changedTouches){ const p = lpos(t); pDown(t.identifier, p.x, p.y); } }, { passive: false });
cv.addEventListener('touchmove', e => { e.preventDefault(); for (const t of e.changedTouches){ const p = lpos(t); pMove(t.identifier, p.x, p.y); } }, { passive: false });
cv.addEventListener('touchend', e => { e.preventDefault(); for (const t of e.changedTouches) pUp(t.identifier); }, { passive: false });
cv.addEventListener('touchcancel', e => { for (const t of e.changedTouches) pUp(t.identifier); });
cv.addEventListener('mousedown', e => { const p = lpos(e); pDown('m', p.x, p.y); });
cv.addEventListener('mousemove', e => { const p = lpos(e); pMove('m', p.x, p.y); });
cv.addEventListener('mouseup', () => pUp('m'));
document.addEventListener('gesturestart', e => e.preventDefault());

// keyboard (desktop testing)
let kbPull = false;
document.addEventListener('keydown', e => {
  if (e.repeat) return;
  if (state !== 'play'){ if (e.code === 'Enter' || e.code === 'Space') startGame(); return; }
  if (e.code === 'ArrowLeft' || e.code === 'KeyZ'){ if (!LF.on && !tilted) sfx.flip(); LF.on = true; }
  if (e.code === 'ArrowRight' || e.code === 'Slash' || e.code === 'KeyM'){ if (!RF.on && !tilted) sfx.flip(); RF.on = true; }
  if (e.code === 'Space' || e.code === 'ArrowDown') kbPull = true;
  if (e.code === 'KeyN') doNudge();
});
document.addEventListener('keyup', e => {
  if (e.code === 'ArrowLeft' || e.code === 'KeyZ') LF.on = false;
  if (e.code === 'ArrowRight' || e.code === 'Slash' || e.code === 'KeyM') RF.on = false;
  if (e.code === 'Space' || e.code === 'ArrowDown'){
    kbPull = false;
    if (pull > 0.04) launchFromPlunger(pull);
    pull = 0;
  }
});

// ════════════════════════════════════════════
// SHADOW HELPERS
// ════════════════════════════════════════════
function ds(ctx, ox, oy, bl, col){ ctx.shadowOffsetX = ox; ctx.shadowOffsetY = oy; ctx.shadowBlur = bl; ctx.shadowColor = col || 'rgba(0,0,0,0.58)'; }
function cs(ctx){ ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0; ctx.shadowBlur = 0; ctx.shadowColor = 'transparent'; }

// ════════════════════════════════════════════
// PRE-RENDERED BACKGROUND
// ════════════════════════════════════════════
const BGS = 2;
let bgCv = null;
function buildBG(){
  bgCv = document.createElement('canvas');
  bgCv.width = W * BGS; bgCv.height = H * BGS;
  const b = bgCv.getContext('2d');
  b.scale(BGS, BGS);

  // Cabinet base
  b.fillStyle = '#0c0c0e'; b.fillRect(0, 0, W, H);
  for (let y = 0; y < H; y += 3){ b.fillStyle = `rgba(255,255,255,${0.010 + Math.sin(y * 0.8) * 0.004})`; b.fillRect(0, y, W, 1); }

  // Side rails
  const lG = b.createLinearGradient(0, 0, 22, 0);
  lG.addColorStop(0, '#080808'); lG.addColorStop(0.38, '#343438'); lG.addColorStop(0.7, '#262628'); lG.addColorStop(1, '#181818');
  b.fillStyle = lG; b.fillRect(0, 0, 22, H);
  const rG = b.createLinearGradient(W - 22, 0, W, 0);
  rG.addColorStop(0, '#181818'); rG.addColorStop(0.3, '#262628'); rG.addColorStop(0.62, '#343438'); rG.addColorStop(1, '#080808');
  b.fillStyle = rG; b.fillRect(W - 22, 0, 22, H);
  const tCap = b.createLinearGradient(0, 0, 0, 24); tCap.addColorStop(0, '#303034'); tCap.addColorStop(1, '#161618');
  b.fillStyle = tCap; b.fillRect(0, 0, W, 24);
  const bCap = b.createLinearGradient(0, H - 24, 0, H); bCap.addColorStop(0, '#161618'); bCap.addColorStop(1, '#303034');
  b.fillStyle = bCap; b.fillRect(0, H - 24, W, 24);

  // Phillips screws

// ── board (photo with moving parts erased) + cut-out object sprites ──
// Each operating part is a sprite cut from the reference photo, animated by
// the physics (flippers rotate, plunger slides) over the erased board.
let bgImg = null, bgReady = false;
const SPR = {};                 // name -> {img, ready}
const SPRITE_FILES = ['board', 'flipperL', 'flipperR', 'plunger'];
// sprite metadata (photo px), from build-assets.cjs / sprites.json
const SMETA = {
  flipL: { piv: [338, 1018], S: 280 },
  flipR: { piv: [620, 1018], S: 280 },
  plunger: { x0: 950, y0: 995, w: 65, h: 350 },
};
function loadSprite(name, onBoard){
  if (typeof Image === 'undefined') return;
  const im = new Image();
  const rec = { img: im, ready: false };
  im.onload = () => { rec.ready = true; if (onBoard){ bgImg = im; bgReady = true; } };
  im.onerror = () => {};
  im.src = name + '.png';
  SPR[name] = rec;
}
SPRITE_FILES.forEach(n => loadSprite(n, n === 'board'));
// test hook (harmless in production): inject board + sprites for headless render
if (typeof globalThis !== 'undefined'){
  globalThis.__setSprites = (imgs) => {
    bgImg = imgs.board; bgReady = true;
    for (const k in imgs) SPR[k] = { img: imgs[k], ready: true };
  };
  globalThis.__setBG = img => { bgImg = img; bgReady = true; };  // legacy harness hook
}

// DRAW COMPONENTS
// ════════════════════════════════════════════
// The reference photo already shows every static element photorealistically.
// At runtime we only add: the ball, live flippers, and additive light/glow
// overlays that reflect game state on top of the photo's elements.
function glow(x, y, r, col, a){
  g.save(); g.globalCompositeOperation = 'lighter'; g.globalAlpha = a;
  const gg = g.createRadialGradient(x, y, 0, x, y, r);
  gg.addColorStop(0, col); gg.addColorStop(1, 'rgba(0,0,0,0)');
  g.fillStyle = gg; g.beginPath(); g.arc(x, y, r, 0, Math.PI*2); g.fill();
  g.restore();
}
function bumperGlow(x, y, fl, boosted){
  if (boosted) glow(x, y, 30, 'rgba(224,184,80,0.55)', 0.5);
  if (fl > 0) glow(x, y, 22 + fl*26, '#fff0c0', Math.min(1, fl));
}
function targetState(body){
  const { x, y } = body.position, sink = body.plugin.sink, fl = body.plugin.fl;
  if (sink > 0.15){
    // dropped: darken the photo's lit window
    g.save(); g.globalAlpha = Math.min(0.85, sink); g.fillStyle = '#0c0b08';
    g.beginPath(); g.roundRect(x-10, y-9, 20, 18, 3); g.fill(); g.restore();
  }
  if (fl > 0) glow(x, y, 18, '#ffd24a', Math.min(1, fl/30));
}
function slingFlash(verts, fl){
  if (fl <= 0) return;
  const a = verts[0], b = verts[1];
  glow((a[0]+b[0])/2, (a[1]+b[1])/2, 26, '#fff4d0', Math.min(1, fl/30));
}

// draw the real photo flipper (cut-out sprite) rotated about its pivot
function drawFlipper(f, meta){
  const spr = f.left ? SPR.flipperL : SPR.flipperR;
  const r = f.body.angle - f.rest;           // 0 at rest; rotates as it flips
  if (spr && spr.ready){
    const s = meta.S * T.IMG_K;
    g.save();
    g.translate(f.pivX, f.y); g.rotate(r);
    if (f.on && !tilted) ds(g, 0, 0, 9, C.gLt);
    g.drawImage(spr.img, -s/2, -s/2, s, s);
    cs(g);
    g.restore();
  } else {
    // fallback: simple flipper from physics body
    const v = f.body.vertices;
    g.beginPath(); g.moveTo(v[0].x, v[0].y); v.forEach(p => g.lineTo(p.x, p.y)); g.closePath();
    g.fillStyle = '#EEE7D3'; g.fill();
  }
}

function drawBall(b){
  const tr = b.plugin.trail;
  tr.push({ x: b.position.x, y: b.position.y });
  if (tr.length > 7) tr.shift();
  for (let i = 0; i < tr.length - 1; i++){
    const a = (i + 1) / tr.length * 0.18;
    g.beginPath(); g.arc(tr[i].x, tr[i].y, T.BALL_R * (0.4 + i / tr.length * 0.5), 0, Math.PI*2);
    g.fillStyle = `rgba(220,220,235,${a})`; g.fill();
  }
  const { x, y } = b.position, R = T.BALL_R;
  ds(g, 3, 5, 11, 'rgba(0,0,0,0.58)'); g.beginPath(); g.arc(x, y, R, 0, Math.PI*2); g.fillStyle = 'rgba(0,0,0,0.32)'; g.fill(); cs(g);
  const bg = g.createRadialGradient(x-4, y-4, 1, x, y, R);
  bg.addColorStop(0,'#ffffff'); bg.addColorStop(0.18,'#e8e8ee'); bg.addColorStop(0.5,'#c0c0c8'); bg.addColorStop(0.82,'#888892'); bg.addColorStop(1,'#585862');
  g.beginPath(); g.arc(x, y, R, 0, Math.PI*2); g.fillStyle = bg; g.fill(); g.strokeStyle = 'rgba(135,135,145,0.5)'; g.lineWidth = 0.8; g.stroke();
  const hg2 = g.createRadialGradient(x-5, y-5, 0, x-3, y-3, 6);
  hg2.addColorStop(0,'rgba(255,255,255,0.96)'); hg2.addColorStop(0.4,'rgba(255,255,255,0.5)'); hg2.addColorStop(1,'rgba(255,255,255,0)');
  g.beginPath(); g.arc(x-2, y-3, 6, 0, Math.PI*2); g.fillStyle = hg2; g.fill();
  g.beginPath(); g.arc(x+3, y-6, 2, 0, Math.PI*2); g.fillStyle = 'rgba(255,255,255,0.36)'; g.fill();
}

// the real photo plunger (cut-out sprite) slides down as it is pulled
function drawPlunger(){
  const m = SMETA.plunger, spr = SPR.plunger;
  if (spr && spr.ready){
    const sx = m.x0 * T.IMG_K, sy = T.IMG_Y + m.y0 * T.IMG_K;
    const sw = m.w * T.IMG_K, sh = m.h * T.IMG_K;
    g.drawImage(spr.img, sx, sy + pull * T.PULL_MAX, sw, sh);
  }
  const laneBall = state === 'play' && balls.some(b => b.plugin.inLane && b.position.y > T.PH_Y - 30);
  if (!laneBall) return;
  const gx = T.LANE_X + 16, gTop = T.PH_Y - 96, gh = 96;
  if (pull > 0){
    g.beginPath(); g.roundRect(gx, gTop, 7, gh, 3); g.fillStyle = 'rgba(7,7,5,0.85)'; g.fill();
    g.strokeStyle = 'rgba(120,105,65,0.8)'; g.lineWidth = 1; g.stroke();
    const bh = pull * (gh - 4);
    const pr = 158 + pull * 88 | 0, pg = 148 - pull * 94 | 0;
    ds(g, 0, 0, 8, `rgb(${pr},${pg},18)`);
    g.fillStyle = `rgb(${pr},${pg},18)`;
    g.beginPath(); g.roundRect(gx + 1.5, gTop + 2 + (gh - 4 - bh), 4, bh, 2); g.fill(); cs(g);
  } else if (Math.sin(now() * 0.005) > 0){
    ds(g, 0, 0, 6, C.gLt);
    g.fillStyle = C.gLt; g.font = 'bold 9px "Helvetica Neue"'; g.textAlign = 'center'; g.textBaseline = 'middle';
    g.fillText('PULL ▼', T.LANE_X, T.PH_Y - 110); cs(g);
  }
}

// ════════════════════════════════════════════
// MAIN DRAW
// ════════════════════════════════════════════
function draw(){
  g.setTransform(SC, 0, 0, SC, 0, 0);
  if (shakeT > 0){
    const k = shakeT / 10;
    g.translate((Math.random()-.5) * 6 * k, (Math.random()-.5) * 7 * k);
  }
  g.clearRect(-10, -10, W+20, H+20);
  g.fillStyle = '#060606'; g.fillRect(0, 0, W, H);
  // real photo as the playfield, undistorted, full width
  const imgH = bgReady ? W * bgImg.height / bgImg.width : 520;
  if (bgReady) g.drawImage(bgImg, 0, T.IMG_Y, W, imgH);
  // backbox header above the table, dark base below
  const top = backbox(); // returns header height
  g.fillStyle = '#050505'; g.fillRect(0, T.IMG_Y + imgH - 1, W, H - (T.IMG_Y + imgH) + 2);

  const tNow = now();
  const boosted = tNow < sysBoostUntil;

  // ── state light overlays on the photo's real elements ──
  tb.bumps.forEach(b => bumperGlow(b.position.x, b.position.y, b.plugin.fl / 64, boosted));
  tb.vbT.forEach(targetState); tb.sbT.forEach(targetState);
  slingFlash(T.SLING_L, tb.slingL.plugin.fl); slingFlash(T.SLING_R, tb.slingR.plugin.fl);

  // core mode lamps (the pills are in the photo; we light the active/done LEDs)
  for (let i = 0; i < T.NMODES; i++){
    const y = CMY0 + i*CMDY, fl = cmFl[i] / 64;
    const ledX = CMX - 47;
    if (i < mode) glow(ledX, y, 7, '#e8b840', 0.9);                 // done
    else if (i === mode){ glow(ledX, y, 7 + fl*8, '#ffe27a', 0.7 + fl*0.3);  // active (pulse)
      glow(CMX, y, 52, '#e0b850', 0.10 + fl*0.25); }
  }
  // active-mode progress pips under the ladder
  if (mode < T.NMODES){
    for (let d = 0; d < MNEED; d++) if (d < mhits) glow(CMX - 8 + d*8, CMY0 + mode*CMDY + 10, 5, '#fff0b0', 0.95);
  }

  // orbit lock lamps (ORBIT LIGHT LOCK box, upper-right of the photo)
  for (let i = 0; i < 3; i++) if (i < locks) glow(290 + i*9, 300, 6, '#e8c050', 0.95);

  // SHOOT AGAIN lamp lit while ball-save is active
  if (state === 'play' && tNow < saveUntil && Math.sin(tNow * 0.012) > -0.3)
    glow(T.SAX, T.SAY, 20, '#ffe080', 0.85);

  // Flippers, plunger feedback, balls
  drawFlipper(LF, SMETA.flipL); drawFlipper(RF, SMETA.flipR);
  drawPlunger();
  balls.forEach(drawBall);

  // Particles
  parts = parts.filter(p => p.life > 0);
  parts.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.11; p.life--;
    const a = p.life / 48;
    g.beginPath(); g.arc(p.x, p.y, p.r * a + 0.3, 0, Math.PI*2);
    g.fillStyle = p.col + (Math.floor(Math.max(0, Math.min(1, a)) * 215).toString(16).padStart(2, '0')); g.fill();
  });

  // Float texts
  ftxts = ftxts.filter(f => f.life > 0);
  ftxts.forEach(f => {
    f.y += f.vy; f.life--;
    g.globalAlpha = Math.min(1, f.life / 14);
    g.shadowColor = f.col; g.shadowBlur = 8; g.fillStyle = f.col;
    g.font = `bold ${f.sz}px "Helvetica Neue"`; g.textAlign = 'center'; g.textBaseline = 'middle';
    g.fillText(f.t, f.x, f.y);
    g.shadowBlur = 0; g.globalAlpha = 1;
  });

  drawHUD(tNow);
  if (tilted) drawTilt(tNow);
  if (state === 'title') drawTitle(tNow);
  if (state === 'over') drawGameOver(tNow);
}

// backbox header above the table (real-machine style): logo + score panel
function backbox(){
  const h = T.IMG_Y;
  const bg = g.createLinearGradient(0, 0, 0, h);
  bg.addColorStop(0, '#17171a'); bg.addColorStop(0.6, '#0e0e10'); bg.addColorStop(1, '#070708');
  g.fillStyle = bg; g.fillRect(0, 0, W, h);
  // brushed sheen lines
  for (let y = 0; y < h; y += 3){ g.fillStyle = `rgba(255,255,255,${0.012 + Math.sin(y*0.7)*0.005})`; g.fillRect(0, y, W, 1); }
  // gold trim at the seam
  ds(g, 0, 0, 6, C.gold); g.fillStyle = C.gold; g.fillRect(0, h-3, W, 1.6); cs(g);
  g.strokeStyle = 'rgba(70,62,40,0.5)'; g.lineWidth = 1; g.beginPath(); g.moveTo(0, h-0.5); g.lineTo(W, h-0.5); g.stroke();
  // AURORA logo + wordmark
  g.save(); g.translate(W/2, 54);
  ds(g, 0, 0, 12, C.gLt); g.strokeStyle = C.gLt; g.lineWidth = 2.5;
  g.beginPath(); g.moveTo(0, -22); g.lineTo(20, 16); g.lineTo(-20, 16); g.closePath(); g.stroke();
  g.beginPath(); g.moveTo(-9, 4); g.lineTo(9, 4); g.stroke(); cs(g); g.restore();
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.fillStyle = C.gLt; g.font = 'bold 16px "Helvetica Neue"'; g.fillText('AURORA', W/2, 92);
  g.fillStyle = 'rgba(150,134,92,0.7)'; g.font = '7px "Helvetica Neue"'; g.fillText('I N D U S T R I E S', W/2, 106);
  return h;
}

function drawHUD(tNow){
  const baseY = 152;
  g.textBaseline = 'middle';
  // sound icon (top-left, tappable)
  g.strokeStyle = muted ? 'rgba(140,120,80,0.5)' : C.gLt; g.fillStyle = g.strokeStyle; g.lineWidth = 1.4;
  g.beginPath(); g.moveTo(12, 17); g.lineTo(16, 17); g.lineTo(21, 13); g.lineTo(21, 25); g.lineTo(16, 21); g.lineTo(12, 21); g.closePath(); g.fill();
  if (muted){ g.beginPath(); g.moveTo(24, 15); g.lineTo(31, 23); g.moveTo(31, 15); g.lineTo(24, 23); g.stroke(); }
  else { g.beginPath(); g.arc(22, 19, 5.5, -0.9, 0.9); g.stroke(); g.beginPath(); g.arc(22, 19, 9, -0.9, 0.9); g.stroke(); }
  // big DMD-style score
  ds(g, 0, 0, 12, C.gLt); g.fillStyle = C.gLt; g.font = 'bold 32px "Helvetica Neue"'; g.textAlign = 'center';
  g.fillText(score.toLocaleString('en-US'), W/2, baseY); cs(g);
  // ball / mode / best row
  g.fillStyle = 'rgba(175,158,108,0.95)'; g.font = 'bold 10px "Helvetica Neue"'; g.textAlign = 'left';
  g.fillText('BALL ' + Math.min(ballNum, 3) + '/3', 16, baseY + 32);
  g.textAlign = 'right'; g.fillText('BEST ' + hi.toLocaleString('en-US'), W-16, baseY + 32);
  g.textAlign = 'center'; g.fillStyle = 'rgba(200,182,130,0.95)'; g.font = 'bold 10px "Helvetica Neue"';
  g.fillText(MODES[mode], W/2, baseY + 32);
  const m = multNow();
  if (m > 1 && state === 'play'){
    ds(g, 0, 0, 6, C.gGlow); g.fillStyle = C.gGlow; g.font = 'bold 13px "Helvetica Neue"';
    g.fillText('× ' + m, W/2, baseY + 50); cs(g);
  }
}

function drawTilt(tNow){
  if (Math.sin(tNow * 0.012) > -0.2){
    ds(g, 0, 0, 22, '#ff2020');
    g.fillStyle = '#ff3030'; g.font = 'bold 46px "Helvetica Neue"'; g.textAlign = 'center'; g.textBaseline = 'middle';
    g.fillText('T I L T', W/2, 330); cs(g);
  }
}

function drawTitle(tNow){
  g.fillStyle = 'rgba(3,3,2,0.88)'; g.fillRect(0, 0, W, H);
  g.save(); g.translate(W/2, 200);
  ds(g, 0, 0, 22, C.gLt); g.strokeStyle = C.gLt; g.lineWidth = 3.5;
  g.beginPath(); g.moveTo(0, -52); g.lineTo(48, 38); g.lineTo(-48, 38); g.closePath(); g.stroke();
  g.beginPath(); g.moveTo(-22, 8); g.lineTo(22, 8); g.stroke(); cs(g); g.restore();
  ds(g, 0, 0, 14, C.gLt);
  g.fillStyle = C.gLt; g.font = 'bold 30px "Helvetica Neue"'; g.textAlign = 'center'; g.textBaseline = 'middle';
  g.fillText('AURORA', W/2, 300);
  g.font = '13px "Helvetica Neue"'; g.fillText('I N D U S T R I E S', W/2, 326); cs(g);
  g.fillStyle = 'rgba(170,152,102,0.95)'; g.font = 'bold 16px "Helvetica Neue"';
  g.fillText('— PINBALL —', W/2, 362);
  const lines = [
    ['左半分タップ', '左フリッパー'],
    ['右半分タップ', '右フリッパー'],
    ['右レーンを下にドラッグ→離す', 'プランジャー発射'],
    ['下パネルを上にフリック', 'ナッジ(3回でTILT)'],
  ];
  lines.forEach(([a, b2], i) => {
    const y = 420 + i * 30;
    g.fillStyle = C.gLt; g.font = 'bold 12px "Helvetica Neue"'; g.textAlign = 'right';
    g.fillText(a, W/2 + 30, y);
    g.fillStyle = 'rgba(150,134,92,0.9)'; g.font = '11px "Helvetica Neue"'; g.textAlign = 'left';
    g.fillText(b2, W/2 + 42, y);
  });
  g.textAlign = 'center';
  g.fillStyle = 'rgba(150,134,92,0.85)'; g.font = '10px "Helvetica Neue"';
  g.fillText('ORBIT×3でマルチボール ／ ELEVATE到達で3X', W/2, 555);
  if (Math.sin(tNow * 0.004) > 0){
    ds(g, 0, 0, 10, C.gLt); g.fillStyle = C.gLt; g.font = 'bold 17px "Helvetica Neue"';
    g.fillText('TAP TO START', W/2, 610); cs(g);
  }
  if (hi > 0){
    g.fillStyle = 'rgba(136,122,76,0.92)'; g.font = '11px "Helvetica Neue"';
    g.fillText('BEST: ' + hi.toLocaleString('en-US'), W/2, 650);
  }
}

function drawGameOver(tNow){
  g.fillStyle = 'rgba(3,3,2,0.93)'; g.fillRect(0, 0, W, H);
  const gox = W/2-155, goy = H/2-162, gow = 310, goh = 324;
  ds(g, 0, 0, 38, 'rgba(178,138,38,0.33)');
  const panG = g.createLinearGradient(gox, goy, gox+gow, goy+goh);
  panG.addColorStop(0,'#1e1e20'); panG.addColorStop(1,'#141416');
  g.fillStyle = panG; g.beginPath(); g.roundRect(gox, goy, gow, goh, 14); g.fill(); cs(g);
  ds(g, 0, 0, 18, C.gold); g.strokeStyle = C.gold; g.lineWidth = 2; g.beginPath(); g.roundRect(gox, goy, gow, goh, 14); g.stroke(); cs(g);
  g.strokeStyle = 'rgba(75,68,42,0.42)'; g.lineWidth = 1; g.beginPath(); g.roundRect(gox+6, goy+6, gow-12, goh-12, 10); g.stroke();
  g.save(); g.translate(W/2, H/2-122); ds(g, 0, 0, 14, C.gLt); g.strokeStyle = C.gLt; g.lineWidth = 2.5;
  g.beginPath(); g.moveTo(0,-28); g.lineTo(26,20); g.lineTo(-26,20); g.closePath(); g.stroke();
  g.beginPath(); g.moveTo(-12,4); g.lineTo(12,4); g.stroke(); cs(g); g.restore();
  ds(g, 0, 0, 15, C.gLt); g.fillStyle = C.gLt; g.font = 'bold 32px "Helvetica Neue"'; g.textAlign = 'center'; g.textBaseline = 'middle';
  g.fillText('GAME OVER', W/2, H/2-78); cs(g);
  g.fillStyle = 'rgba(160,142,90,0.88)'; g.font = 'bold 11px "Helvetica Neue"'; g.fillText('AURORA INDUSTRIES', W/2, H/2-48);
  g.strokeStyle = 'rgba(78,70,44,0.38)'; g.lineWidth = 1; g.beginPath(); g.moveTo(W/2-85, H/2-35); g.lineTo(W/2+85, H/2-35); g.stroke();
  g.fillStyle = C.gLt; g.font = 'bold 26px "Helvetica Neue"'; g.fillText('SCORE: ' + score.toLocaleString('en-US'), W/2, H/2-14);
  g.fillStyle = 'rgba(136,122,76,0.92)'; g.font = '17px "Helvetica Neue"'; g.fillText('BEST: ' + hi.toLocaleString('en-US'), W/2, H/2+18);
  g.fillStyle = 'rgba(120,108,68,0.82)'; g.font = '11px "Helvetica Neue"'; g.fillText('MODE: ' + MODES[Math.min(mode, 4)], W/2, H/2+50);
  if (Math.sin(tNow * 0.004) > 0){
    ds(g, 0, 0, 10, C.gLt); g.fillStyle = C.gLt; g.font = 'bold 14px "Helvetica Neue"';
    g.fillText('TAP TO PLAY AGAIN', W/2, H/2+92); cs(g);
  }
}

// ════════════════════════════════════════════
// MAIN LOOP (fixed timestep accumulator)
// ════════════════════════════════════════════
let last = performance.now(), acc = 0;
function loop(ts){
  let dt = Math.min(ts - last, 50);
  last = ts; acc += dt;
  if (kbPull) pull = Math.min(pull + dt / 900, 1);
  let n = 0;
  while (acc >= STEP && n < 8){ physStep(); acc -= STEP; n++; }
  if (n === 8) acc = 0;
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
