<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#a8d8ea" stop-opacity=".04"/>
      <stop offset="100%" stop-color="#08090c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="circle-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a8d8ea" stop-opacity=".35"/>
      <stop offset="50%" stop-color="#a8d8ea" stop-opacity=".1"/>
      <stop offset="100%" stop-color="#a8d8ea" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="450" fill="#08090c"/>
  <rect width="800" height="450" fill="url(#bg-glow)"/>
  <!-- Grid -->
  <g stroke="rgba(255,255,255,.015)" stroke-width=".5">
    <line x1="0" y1="56" x2="800" y2="56"/><line x1="0" y1="112" x2="800" y2="112"/>
    <line x1="0" y1="168" x2="800" y2="168"/><line x1="0" y1="224" x2="800" y2="224"/>
    <line x1="0" y1="280" x2="800" y2="280"/><line x1="0" y1="336" x2="800" y2="336"/>
    <line x1="0" y1="392" x2="800" y2="392"/>
    <line x1="100" y1="0" x2="100" y2="450"/><line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/><line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/><line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>
  <!-- Connecting lines to center -->
  <g stroke="rgba(54,61,72,.18)" stroke-width=".5">
    <line x1="400" y1="225" x2="400" y2="95"/>
    <line x1="400" y1="225" x2="512" y2="160"/>
    <line x1="400" y1="225" x2="512" y2="290"/>
    <line x1="400" y1="225" x2="400" y2="355"/>
    <line x1="400" y1="225" x2="288" y2="290"/>
    <line x1="400" y1="225" x2="288" y2="160"/>
  </g>
  <!-- Connecting lines between circles -->
  <g stroke="rgba(54,61,72,.12)" stroke-width=".5">
    <line x1="400" y1="95" x2="512" y2="160"/>
    <line x1="512" y1="160" x2="512" y2="290"/>
    <line x1="512" y1="290" x2="400" y2="355"/>
    <line x1="400" y1="355" x2="288" y2="290"/>
    <line x1="288" y1="290" x2="288" y2="160"/>
    <line x1="288" y1="160" x2="400" y2="95"/>
  </g>
  <!-- Center circle -->
  <circle cx="400" cy="225" r="22" fill="none" stroke="rgba(54,61,72,.3)" stroke-width="1"/>
  <text x="400" y="222" fill="#363d48" font-family="'Space Mono',monospace" font-size="8" text-anchor="middle" letter-spacing="1">YOUR</text>
  <text x="400" y="232" fill="#363d48" font-family="'Space Mono',monospace" font-size="8" text-anchor="middle" letter-spacing="1">TURN</text>
  <!-- Inactive circles -->
  <g>
    <!-- Circle 2 (top-right) -->
    <circle cx="512" cy="160" r="32" fill="rgba(54,61,72,.08)" stroke="#363d48" stroke-width="1"/>
    <circle cx="512" cy="160" r="3" fill="#6b7280"/>
    <text x="512" y="202" fill="#363d48" font-family="'Space Mono',monospace" font-size="10" text-anchor="middle">2</text>
    <!-- Circle 3 (bottom-right) -->
    <circle cx="512" cy="290" r="32" fill="rgba(54,61,72,.08)" stroke="#363d48" stroke-width="1"/>
    <circle cx="512" cy="290" r="3" fill="#6b7280"/>
    <text x="512" y="332" fill="#363d48" font-family="'Space Mono',monospace" font-size="10" text-anchor="middle">3</text>
    <!-- Circle 4 (bottom) -->
    <circle cx="400" cy="355" r="32" fill="rgba(54,61,72,.08)" stroke="#363d48" stroke-width="1"/>
    <circle cx="400" cy="355" r="3" fill="#6b7280"/>
    <text x="400" y="397" fill="#363d48" font-family="'Space Mono',monospace" font-size="10" text-anchor="middle">4</text>
    <!-- Circle 5 (bottom-left) -->
    <circle cx="288" cy="290" r="32" fill="rgba(54,61,72,.08)" stroke="#363d48" stroke-width="1"/>
    <circle cx="288" cy="290" r="3" fill="#6b7280"/>
    <text x="288" y="332" fill="#363d48" font-family="'Space Mono',monospace" font-size="10" text-anchor="middle">5</text>
    <!-- Circle 6 (top-left) -->
    <circle cx="288" cy="160" r="32" fill="rgba(54,61,72,.08)" stroke="#363d48" stroke-width="1"/>
    <circle cx="288" cy="160" r="3" fill="#6b7280"/>
    <text x="288" y="202" fill="#363d48" font-family="'Space Mono',monospace" font-size="10" text-anchor="middle">6</text>
  </g>
  <!-- Active circle 1 (top) with glow -->
  <circle cx="400" cy="95" r="70" fill="url(#circle-glow)"/>
  <circle cx="400" cy="95" r="32" fill="rgba(168,216,234,.15)" stroke="#a8d8ea" stroke-width="2" filter="url(#glow-filter)"/>
  <circle cx="400" cy="95" r="3" fill="#a8d8ea"/>
  <text x="400" y="137" fill="#a8d8ea" font-family="'Space Mono',monospace" font-size="10" text-anchor="middle">1</text>
</svg>
