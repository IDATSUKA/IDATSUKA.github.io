<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <!-- Central radial glow -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="38%">
      <stop offset="0%"   stop-color="#e8531e" stop-opacity="0.45"/>
      <stop offset="35%"  stop-color="#c23a0a" stop-opacity="0.22"/>
      <stop offset="70%"  stop-color="#6e1d04" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#140a08" stop-opacity="0"/>
    </radialGradient>

    <!-- Outer ambient warmth -->
    <radialGradient id="ambientWarm" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#3a1508" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#140a08" stop-opacity="0"/>
    </radialGradient>

    <!-- Gaussian blur for core glow -->
    <filter id="blurCore" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="38"/>
    </filter>

    <!-- Softer blur for particles -->
    <filter id="blurSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>

    <!-- Subtle noise texture -->
    <filter id="noiseTexture" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="mono"/>
      <feBlend in="SourceGraphic" in2="mono" mode="overlay" result="blended"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.12"/>
      </feComponentTransfer>
    </filter>

    <!-- Waveform glow -->
    <filter id="waveGlow" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#140a08"/>

  <!-- Noise overlay for texture -->
  <rect width="1200" height="630" filter="url(#noiseTexture)" fill="#2a1208" opacity="0.4"/>

  <!-- Ambient warm radiance -->
  <rect width="1200" height="630" fill="url(#ambientWarm)"/>

  <!-- Central blurred glow -->
  <ellipse cx="600" cy="315" rx="340" ry="260" fill="url(#coreGlow)" filter="url(#blurCore)"/>

  <!-- Extra hot-spot -->
  <ellipse cx="600" cy="315" rx="120" ry="120" fill="#e8531e" opacity="0.12" filter="url(#blurCore)"/>

  <!-- Concentric rings -->
  <circle cx="600" cy="315" r="80"  fill="none" stroke="rgba(220,100,60,0.15)" stroke-width="1.2"/>
  <circle cx="600" cy="315" r="140" fill="none" stroke="rgba(220,100,60,0.10)" stroke-width="1"/>
  <circle cx="600" cy="315" r="210" fill="none" stroke="rgba(220,100,60,0.06)" stroke-width="0.8"/>
  <circle cx="600" cy="315" r="290" fill="none" stroke="rgba(220,100,60,0.04)" stroke-width="0.6"/>

  <!-- Audio waveform bars (center cluster) -->
  <g opacity="0.7" filter="url(#waveGlow)">
    <!-- Left side bars -->
    <rect x="398" y="295" width="3" height="40" rx="1.5" fill="rgba(220,120,70,0.30)"/>
    <rect x="410" y="280" width="3" height="70" rx="1.5" fill="rgba(220,110,60,0.35)"/>
    <rect x="422" y="290" width="3" height="50" rx="1.5" fill="rgba(220,100,55,0.28)"/>
    <rect x="434" y="270" width="3" height="90" rx="1.5" fill="rgba(225,105,55,0.38)"/>
    <rect x="446" y="285" width="3" height="60" rx="1.5" fill="rgba(220,95,50,0.32)"/>
    <rect x="458" y="260" width="3" height="110" rx="1.5" fill="rgba(230,110,55,0.40)"/>
    <rect x="470" y="275" width="3" height="80" rx="1.5" fill="rgba(225,100,50,0.36)"/>
    <rect x="482" y="250" width="3" height="130" rx="1.5" fill="rgba(235,115,50,0.42)"/>
    <rect x="494" y="265" width="3" height="100" rx="1.5" fill="rgba(230,105,48,0.38)"/>
    <rect x="506" y="240" width="3" height="150" rx="1.5" fill="rgba(240,120,50,0.45)"/>
    <rect x="518" y="255" width="3" height="120" rx="1.5" fill="rgba(235,110,48,0.40)"/>
    <rect x="530" y="230" width="3" height="170" rx="1.5" fill="rgba(242,125,50,0.48)"/>
    <rect x="542" y="248" width="3" height="134" rx="1.5" fill="rgba(238,118,48,0.43)"/>
    <rect x="554" y="222" width="3" height="186" rx="1.5" fill="rgba(245,130,50,0.50)"/>
    <rect x="566" y="238" width="3" height="154" rx="1.5" fill="rgba(240,122,48,0.46)"/>
    <rect x="578" y="215" width="3" height="200" rx="1.5" fill="rgba(248,135,50,0.52)"/>
    <rect x="590" y="225" width="3" height="180" rx="1.5" fill="rgba(245,128,50,0.50)"/>
    <!-- Center peak -->
    <rect x="598" y="205" width="4" height="220" rx="2" fill="rgba(250,140,55,0.55)"/>
    <!-- Right side bars (mirror) -->
    <rect x="610" y="225" width="3" height="180" rx="1.5" fill="rgba(245,128,50,0.50)"/>
    <rect x="622" y="215" width="3" height="200" rx="1.5" fill="rgba(248,135,50,0.52)"/>
    <rect x="634" y="238" width="3" height="154" rx="1.5" fill="rgba(240,122,48,0.46)"/>
    <rect x="646" y="222" width="3" height="186" rx="1.5" fill="rgba(245,130,50,0.50)"/>
    <rect x="658" y="248" width="3" height="134" rx="1.5" fill="rgba(238,118,48,0.43)"/>
    <rect x="670" y="230" width="3" height="170" rx="1.5" fill="rgba(242,125,50,0.48)"/>
    <rect x="682" y="255" width="3" height="120" rx="1.5" fill="rgba(235,110,48,0.40)"/>
    <rect x="694" y="240" width="3" height="150" rx="1.5" fill="rgba(240,120,50,0.45)"/>
    <rect x="706" y="265" width="3" height="100" rx="1.5" fill="rgba(230,105,48,0.38)"/>
    <rect x="718" y="250" width="3" height="130" rx="1.5" fill="rgba(235,115,50,0.42)"/>
    <rect x="730" y="275" width="3" height="80" rx="1.5" fill="rgba(225,100,50,0.36)"/>
    <rect x="742" y="260" width="3" height="110" rx="1.5" fill="rgba(230,110,55,0.40)"/>
    <rect x="754" y="285" width="3" height="60" rx="1.5" fill="rgba(220,95,50,0.32)"/>
    <rect x="766" y="270" width="3" height="90" rx="1.5" fill="rgba(225,105,55,0.38)"/>
    <rect x="778" y="290" width="3" height="50" rx="1.5" fill="rgba(220,100,55,0.28)"/>
    <rect x="790" y="280" width="3" height="70" rx="1.5" fill="rgba(220,110,60,0.35)"/>
    <rect x="802" y="295" width="3" height="40" rx="1.5" fill="rgba(220,120,70,0.30)"/>
  </g>

  <!-- Particle dots scattered around rings -->
  <g filter="url(#blurSoft)">
    <!-- Ring 1 vicinity -->
    <circle cx="658" cy="268" r="2" fill="rgba(230,120,65,0.35)"/>
    <circle cx="535" cy="358" r="1.5" fill="rgba(220,105,55,0.30)"/>
    <circle cx="548" cy="260" r="1.8" fill="rgba(235,115,60,0.32)"/>
    <circle cx="660" cy="370" r="1.3" fill="rgba(225,110,58,0.28)"/>
    <!-- Ring 2 vicinity -->
    <circle cx="720" cy="220" r="2.2" fill="rgba(215,100,55,0.25)"/>
    <circle cx="470" cy="400" r="1.8" fill="rgba(220,95,50,0.22)"/>
    <circle cx="490" cy="210" r="2" fill="rgba(225,105,55,0.24)"/>
    <circle cx="730" cy="420" r="1.5" fill="rgba(210,90,48,0.20)"/>
    <circle cx="445" cy="310" r="1.6" fill="rgba(218,98,52,0.23)"/>
    <!-- Ring 3 vicinity -->
    <circle cx="810" cy="180" r="2.5" fill="rgba(200,85,45,0.18)"/>
    <circle cx="380" cy="440" r="2" fill="rgba(195,80,42,0.16)"/>
    <circle cx="830" cy="400" r="1.8" fill="rgba(205,88,46,0.17)"/>
    <circle cx="370" cy="200" r="2.2" fill="rgba(198,82,44,0.15)"/>
    <circle cx="600" cy="105" r="1.5" fill="rgba(210,90,48,0.14)"/>
    <!-- Ring 4 vicinity -->
    <circle cx="890" cy="160" r="2.8" fill="rgba(185,75,40,0.12)"/>
    <circle cx="310" cy="470" r="2.2" fill="rgba(180,70,38,0.10)"/>
    <circle cx="900" cy="450" r="2" fill="rgba(190,78,42,0.11)"/>
    <circle cx="300" cy="170" r="2.5" fill="rgba(182,72,39,0.10)"/>
    <circle cx="600" cy="40"  r="1.8" fill="rgba(188,76,41,0.09)"/>
    <circle cx="600" cy="590" r="1.8" fill="rgba(188,76,41,0.09)"/>
    <!-- Extra scattered -->
    <circle cx="160" cy="300" r="1.5" fill="rgba(170,65,35,0.07)"/>
    <circle cx="1040" cy="320" r="1.5" fill="rgba(170,65,35,0.07)"/>
    <circle cx="250" cy="520" r="1.2" fill="rgba(175,68,36,0.08)"/>
    <circle cx="950" cy="120" r="1.2" fill="rgba(175,68,36,0.08)"/>
  </g>

  <!-- Additional unblurred crisp particles -->
  <circle cx="680" cy="240" r="1" fill="rgba(250,160,80,0.40)"/>
  <circle cx="520" cy="380" r="1" fill="rgba(250,155,75,0.38)"/>
  <circle cx="560" cy="230" r="0.8" fill="rgba(248,150,72,0.35)"/>
  <circle cx="640" cy="395" r="0.8" fill="rgba(248,150,72,0.35)"/>
  <circle cx="700" cy="350" r="1.2" fill="rgba(252,165,85,0.32)"/>
  <circle cx="500" cy="270" r="1.2" fill="rgba(252,165,85,0.32)"/>

  <!-- PULSE text at bottom -->
  <text x="600" y="590" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="14" font-weight="300" letter-spacing="12"
        fill="rgba(220,110,60,0.12)">PULSE</text>
</svg>