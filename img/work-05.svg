<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Mono">
  <defs>
    <linearGradient id="m-page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(233,238,244,0.05)"/>
      <stop offset="1" stop-color="rgba(233,238,244,0.01)"/>
    </linearGradient>
    <linearGradient id="m-caret" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(233,238,244,0.9)"/>
      <stop offset="1" stop-color="rgba(233,238,244,0.2)"/>
    </linearGradient>
    <filter id="m-blur" x="-200%" y="-100%" width="500%" height="300%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#06070a"/>

  <!-- ghost offset duplicates -->
  <rect x="216" y="124" width="260" height="370" rx="2" fill="none" stroke="rgba(233,238,244,0.05)" stroke-width="1"/>
  <rect x="208" y="132" width="260" height="370" rx="2" fill="none" stroke="rgba(233,238,244,0.09)" stroke-width="1"/>

  <!-- page rectangle -->
  <rect x="200" y="140" width="260" height="370" rx="2" fill="url(#m-page)" stroke="rgba(233,238,244,0.22)" stroke-width="1"/>

  <!-- text placeholder lines, decreasing opacity -->
  <rect x="232" y="190" width="196" height="2" fill="rgba(233,238,244,0.35)"/>
  <rect x="232" y="222" width="170" height="2" fill="rgba(233,238,244,0.24)"/>
  <rect x="232" y="254" width="184" height="2" fill="rgba(233,238,244,0.14)"/>
  <rect x="232" y="286" width="120" height="2" fill="rgba(233,238,244,0.08)"/>

  <!-- glowing cursor caret -->
  <rect x="360" y="278" width="3" height="18" fill="rgba(233,238,244,0.6)" filter="url(#m-blur)"/>
  <rect x="361" y="278" width="1.5" height="18" fill="url(#m-caret)"/>

  <!-- faint page corner mark -->
  <path d="M436 140 L460 140 L460 164" fill="none" stroke="rgba(233,238,244,0.10)" stroke-width="1"/>

  <!-- vast negative space watermark -->
  <text x="800" y="350" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="170" font-weight="100" letter-spacing="70" fill="#e9eef4" opacity="0.04">MONO</text>

  <!-- single quiet dot in the void -->
  <circle cx="980" cy="170" r="1.5" fill="rgba(233,238,244,0.25)"/>

  <!-- title -->
  <text x="120" y="567" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="300" letter-spacing="12" fill="#e9eef4" opacity="0.8">MONO</text>
  <text x="120" y="594" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="300" letter-spacing="6" fill="rgba(233,238,244,0.35)">JOURNALING APP — UI DESIGN</text>
</svg>
