<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Neon glow filter - pink -->
    <filter id="neonGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" in="SourceGraphic" result="blur1"/>
      <feGaussianBlur stdDeviation="25" in="SourceGraphic" result="blur2"/>
      <feGaussianBlur stdDeviation="50" in="SourceGraphic" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Heavy blur for ambient glow -->
    <filter id="ambientGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>

    <!-- Medium blur -->
    <filter id="medGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>

    <!-- Pin glow -->
    <filter id="pinGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="8" in="SourceGraphic" result="blur1"/>
      <feGaussianBlur stdDeviation="18" in="SourceGraphic" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Noise grain -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" seed="12"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="0.05"/>
        <feFuncG type="linear" slope="0.05"/>
        <feFuncB type="linear" slope="0.05"/>
        <feFuncA type="linear" slope="0.12"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>

    <!-- Central radial glow gradient -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6b1d7a" stop-opacity="0.25"/>
      <stop offset="30%" stop-color="#4a1260" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#2a0a3d" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0c0618" stop-opacity="0"/>
    </radialGradient>

    <!-- Phone screen gradient -->
    <linearGradient id="phoneScreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0f0620" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Neon pink gradient -->
    <linearGradient id="neonPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff50b4"/>
      <stop offset="100%" stop-color="#d040ff"/>
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#8844aa" stroke-opacity="0.04" stroke-width="0.5"/>
    </pattern>

    <!-- Neon line gradient -->
    <linearGradient id="neonLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff50b4" stop-opacity="0"/>
      <stop offset="30%" stop-color="#ff50b4" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#d040ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#d040ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Deep purple background -->
  <rect width="1200" height="630" fill="#0c0618"/>

  <!-- Central ambient glow -->
  <rect width="1200" height="630" fill="url(#centerGlow)"/>

  <!-- Large ambient neon blob - pink/magenta -->
  <ellipse cx="750" cy="300" rx="200" ry="180" fill="#ff50b4" opacity="0.06" filter="url(#ambientGlow)"/>

  <!-- Secondary ambient blob - purple -->
  <ellipse cx="400" cy="350" rx="150" ry="140" fill="#8040d0" opacity="0.05" filter="url(#ambientGlow)"/>

  <!-- Grid pattern overlay -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Phone shape - neon rectangle off-center right -->
  <!-- Phone glow backdrop -->
  <rect x="720" y="120" width="180" height="380" rx="16" fill="#ff50b4" opacity="0.08" filter="url(#medGlow)"/>

  <!-- Phone outer frame -->
  <rect x="720" y="120" width="180" height="380" rx="16" fill="none" stroke="#ff50b4" stroke-opacity="0.5" stroke-width="1.2" filter="url(#neonGlow)"/>

  <!-- Phone inner screen -->
  <rect x="730" y="140" width="160" height="340" rx="8" fill="url(#phoneScreen)"/>

  <!-- Phone screen UI elements - list items -->
  <line x1="750" y1="190" x2="860" y2="190" stroke="#ff50b4" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="750" y1="220" x2="840" y2="220" stroke="#ff50b4" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="750" y1="250" x2="855" y2="250" stroke="#ff50b4" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="750" y1="280" x2="830" y2="280" stroke="#d040ff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Phone screen - small circles suggesting map dots -->
  <circle cx="770" cy="360" r="3" fill="#ff50b4" opacity="0.35"/>
  <circle cx="820" cy="340" r="2" fill="#d040ff" opacity="0.25"/>
  <circle cx="850" cy="380" r="2.5" fill="#ff50b4" opacity="0.2"/>
  <circle cx="790" cy="400" r="1.8" fill="#d040ff" opacity="0.3"/>
  <circle cx="840" cy="420" r="2" fill="#ff50b4" opacity="0.15"/>

  <!-- Phone status bar dots -->
  <circle cx="800" cy="155" r="1.5" fill="#ff50b4" opacity="0.3"/>
  <circle cx="810" cy="155" r="1.5" fill="#ff50b4" opacity="0.2"/>
  <circle cx="820" cy="155" r="1.5" fill="#ff50b4" opacity="0.1"/>

  <!-- Neon map pin - bright pink dot with glow -->
  <circle cx="380" cy="280" r="6" fill="#ff50b4" opacity="0.9" filter="url(#pinGlow)"/>
  <circle cx="380" cy="280" r="12" fill="none" stroke="#ff50b4" stroke-opacity="0.3" stroke-width="0.8"/>
  <circle cx="380" cy="280" r="20" fill="none" stroke="#ff50b4" stroke-opacity="0.12" stroke-width="0.5"/>

  <!-- Second smaller pin -->
  <circle cx="300" cy="380" r="3" fill="#d040ff" opacity="0.6" filter="url(#softGlow)"/>
  <circle cx="300" cy="380" r="8" fill="none" stroke="#d040ff" stroke-opacity="0.2" stroke-width="0.5"/>

  <!-- Third pin -->
  <circle cx="480" cy="340" r="4" fill="#ff50b4" opacity="0.5" filter="url(#softGlow)"/>

  <!-- Connecting lines between pins (map routes) -->
  <line x1="380" y1="280" x2="300" y2="380" stroke="#ff50b4" stroke-opacity="0.08" stroke-width="0.8" stroke-dasharray="4,6"/>
  <line x1="380" y1="280" x2="480" y2="340" stroke="#d040ff" stroke-opacity="0.06" stroke-width="0.8" stroke-dasharray="4,6"/>

  <!-- Horizontal neon accent line -->
  <rect x="100" y="314" width="500" height="1" fill="url(#neonLine)" filter="url(#softGlow)"/>

  <!-- Abstract UI card left side -->
  <rect x="120" y="160" width="220" height="130" rx="6" fill="none" stroke="#8844aa" stroke-opacity="0.08" stroke-width="0.5"/>
  <line x1="140" y1="195" x2="280" y2="195" stroke="#ff50b4" stroke-opacity="0.1" stroke-width="0.8"/>
  <line x1="140" y1="215" x2="260" y2="215" stroke="#ff50b4" stroke-opacity="0.07" stroke-width="0.8"/>
  <line x1="140" y1="235" x2="270" y2="235" stroke="#d040ff" stroke-opacity="0.05" stroke-width="0.8"/>
  <rect x="140" y="255" width="50" height="16" rx="3" fill="#ff50b4" opacity="0.08"/>

  <!-- Floating UI elements -->
  <rect x="180" y="420" width="140" height="80" rx="4" fill="none" stroke="#d040ff" stroke-opacity="0.06" stroke-width="0.5"/>
  <circle cx="210" cy="450" r="8" fill="none" stroke="#ff50b4" stroke-opacity="0.12" stroke-width="0.5"/>
  <line x1="230" y1="448" x2="300" y2="448" stroke="#ff50b4" stroke-opacity="0.08" stroke-width="0.6"/>
  <line x1="230" y1="462" x2="280" y2="462" stroke="#d040ff" stroke-opacity="0.06" stroke-width="0.6"/>

  <!-- Decorative diagonal lines -->
  <line x1="950" y1="80" x2="1100" y2="180" stroke="#8844aa" stroke-opacity="0.06" stroke-width="0.5"/>
  <line x1="970" y1="80" x2="1120" y2="180" stroke="#8844aa" stroke-opacity="0.04" stroke-width="0.5"/>

  <!-- Bottom decorative elements -->
  <line x1="950" y1="520" x2="1100" y2="520" stroke="#d040ff" stroke-opacity="0.08" stroke-width="0.5"/>
  <line x1="980" y1="540" x2="1080" y2="540" stroke="#ff50b4" stroke-opacity="0.06" stroke-width="0.5"/>

  <!-- Floating neon particles -->
  <circle cx="150" cy="120" r="1.2" fill="#ff50b4" opacity="0.25"/>
  <circle cx="550" cy="100" r="0.8" fill="#d040ff" opacity="0.2"/>
  <circle cx="1050" cy="300" r="1" fill="#ff50b4" opacity="0.15"/>
  <circle cx="600" cy="550" r="1.5" fill="#d040ff" opacity="0.1"/>
  <circle cx="100" cy="500" r="0.8" fill="#ff50b4" opacity="0.18"/>
  <circle cx="1100" cy="450" r="1" fill="#d040ff" opacity="0.12"/>

  <!-- Brand text -->
  <text x="120" y="580" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#ff50b4" opacity="0.2" letter-spacing="6" font-weight="300">NEON DISTRICT</text>

  <!-- Large watermark text -->
  <text x="600" y="360" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="160" fill="#ff50b4" opacity="0.025" text-anchor="middle" font-weight="100" letter-spacing="15">NEON</text>

  <!-- Corner accent marks -->
  <line x1="40" y1="40" x2="40" y2="70" stroke="#ff50b4" stroke-opacity="0.15" stroke-width="0.5"/>
  <line x1="40" y1="40" x2="70" y2="40" stroke="#ff50b4" stroke-opacity="0.15" stroke-width="0.5"/>
  <line x1="1160" y1="560" x2="1160" y2="590" stroke="#d040ff" stroke-opacity="0.15" stroke-width="0.5"/>
  <line x1="1130" y1="590" x2="1160" y2="590" stroke="#d040ff" stroke-opacity="0.15" stroke-width="0.5"/>

  <!-- Noise texture overlay -->
  <rect width="1200" height="630" fill="transparent" filter="url(#grain)"/>
</svg>