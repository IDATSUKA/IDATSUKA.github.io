<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="KUROMOJI">
  <defs>
    <linearGradient id="k-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071310"/>
      <stop offset="1" stop-color="#0e2420"/>
    </linearGradient>
    <linearGradient id="k-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(200,210,215,0)"/>
      <stop offset="0.5" stop-color="rgba(150,225,205,0.55)"/>
      <stop offset="1" stop-color="rgba(200,210,215,0)"/>
    </linearGradient>
    <radialGradient id="k-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="rgba(140,220,200,0.18)"/>
      <stop offset="1" stop-color="rgba(140,220,200,0)"/>
    </radialGradient>
    <linearGradient id="k-glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(160,230,210,0.10)"/>
      <stop offset="1" stop-color="rgba(160,230,210,0.02)"/>
    </linearGradient>
    <filter id="k-blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#k-bg)"/>

  <!-- ambient jade glow -->
  <circle cx="780" cy="300" r="320" fill="url(#k-glow)"/>

  <!-- large circle outline with jade glow -->
  <circle cx="780" cy="300" r="210" fill="none" stroke="rgba(140,220,200,0.15)" stroke-width="10" filter="url(#k-blur)"/>
  <circle cx="780" cy="300" r="210" fill="none" stroke="rgba(150,225,205,0.45)" stroke-width="1.2"/>
  <circle cx="780" cy="300" r="180" fill="none" stroke="rgba(150,225,205,0.12)" stroke-width="0.8"/>

  <!-- watermark -->
  <text x="180" y="370" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="220" fill="#e9eef4" opacity="0.05" letter-spacing="20">黒文字</text>

  <!-- thin horizontal silver-jade gradient lines -->
  <rect x="120" y="150" width="960" height="1" fill="url(#k-line)" opacity="0.6"/>
  <rect x="160" y="480" width="880" height="1" fill="url(#k-line)" opacity="0.45"/>
  <rect x="240" y="510" width="720" height="0.8" fill="url(#k-line)" opacity="0.25"/>

  <!-- minimal tea packaging: glass rectangle -->
  <g>
    <rect x="730" y="200" width="100" height="200" rx="4" fill="url(#k-glass)" stroke="rgba(190,235,220,0.35)" stroke-width="1"/>
    <rect x="730" y="252" width="100" height="1" fill="rgba(190,235,220,0.30)"/>
    <text x="780" y="320" text-anchor="middle" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="30" fill="rgba(230,245,240,0.7)" writing-mode="tb" letter-spacing="6">黒文字</text>
    <rect x="730" y="370" width="100" height="1" fill="rgba(190,235,220,0.20)"/>
  </g>

  <!-- small accent dot and vertical hairline, zen balance -->
  <circle cx="300" cy="150" r="3" fill="rgba(150,225,205,0.7)"/>
  <line x1="300" y1="190" x2="300" y2="440" stroke="rgba(150,225,205,0.18)" stroke-width="1"/>

  <!-- title -->
  <text x="120" y="555" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="300" letter-spacing="14" fill="#e9eef4" opacity="0.75">KUROMOJI</text>
  <text x="120" y="582" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="300" letter-spacing="6" fill="rgba(150,225,205,0.55)">JAPANESE TEA — BRAND IDENTITY</text>
</svg>
