<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Noise texture filter -->
    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
      <feComponentTransfer in="blended">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>

    <!-- Subtle grain overlay -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="5"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="0.08" intercept="0"/>
        <feFuncG type="linear" slope="0.08" intercept="0"/>
        <feFuncB type="linear" slope="0.08" intercept="0"/>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>

    <!-- Gold glow filter -->
    <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Soft leaf glow -->
    <filter id="leafGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Main radial gradient for circle -->
    <radialGradient id="circleGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a87c" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="#c9a87c" stop-opacity="0.08"/>
      <stop offset="70%" stop-color="#c9a87c" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#c9a87c" stop-opacity="0"/>
    </radialGradient>

    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="35%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#0f2518"/>
      <stop offset="100%" stop-color="#0a1a0f"/>
    </radialGradient>

    <!-- Leaf gradient -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2a16" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0a1a0f" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Gold line gradient -->
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a87c" stop-opacity="0"/>
      <stop offset="15%" stop-color="#c9a87c" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#c9a87c" stop-opacity="0.6"/>
      <stop offset="85%" stop-color="#c9a87c" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#c9a87c" stop-opacity="0"/>
    </linearGradient>

    <!-- Vertical gold fade -->
    <linearGradient id="goldVertical" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c9a87c" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#c9a87c" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#c9a87c" stop-opacity="0"/>
    </linearGradient>

    <!-- Clip path for leaf shape -->
    <clipPath id="leafClip">
      <ellipse cx="280" cy="350" rx="180" ry="280" transform="rotate(-15, 280, 350)"/>
    </clipPath>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="#0a1a0f"/>

  <!-- Subtle radial background glow -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Large elegant circle with golden glow -->
  <circle cx="720" cy="315" r="260" fill="url(#circleGrad)" filter="url(#goldGlow)"/>

  <!-- Secondary smaller circle -->
  <circle cx="720" cy="315" r="180" fill="none" stroke="#c9a87c" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Third concentric ring -->
  <circle cx="720" cy="315" r="120" fill="none" stroke="#c9a87c" stroke-opacity="0.03" stroke-width="0.5"/>

  <!-- Horizontal gold line across left side -->
  <rect x="0" y="314" width="520" height="1" fill="url(#goldLine)"/>

  <!-- Secondary horizontal line, thinner -->
  <rect x="60" y="340" width="320" height="0.5" fill="#c9a87c" opacity="0.15"/>

  <!-- Short horizontal accent -->
  <rect x="100" y="288" width="80" height="0.5" fill="#c9a87c" opacity="0.25"/>

  <!-- Japanese watermark characters -->
  <text x="600" y="420" font-family="'Hiragino Mincho ProN', 'Yu Mincho', 'MS Mincho', serif" font-size="280" fill="#c9a87c" opacity="0.06" text-anchor="middle" letter-spacing="20">黒文字</text>

  <!-- Leaf-like organic curve -->
  <path d="M 140 520 Q 180 300 260 180 Q 290 130 300 180 Q 320 300 200 520 Z" fill="url(#leafGrad)" stroke="#c9a87c" stroke-opacity="0.12" stroke-width="0.8" filter="url(#leafGlow)"/>

  <!-- Second smaller leaf accent -->
  <path d="M 190 490 Q 210 400 240 340 Q 248 320 250 340 Q 260 400 220 490 Z" fill="none" stroke="#c9a87c" stroke-opacity="0.08" stroke-width="0.5"/>

  <!-- Leaf vein line -->
  <line x1="220" y1="200" x2="200" y2="500" stroke="#c9a87c" stroke-opacity="0.05" stroke-width="0.5"/>

  <!-- Tea packaging rectangles - thin gold lines -->
  <rect x="880" y="160" width="45" height="120" fill="none" stroke="#c9a87c" stroke-opacity="0.12" stroke-width="0.6" rx="1"/>
  <rect x="940" y="180" width="45" height="120" fill="none" stroke="#c9a87c" stroke-opacity="0.08" stroke-width="0.6" rx="1"/>
  <rect x="1000" y="200" width="45" height="120" fill="none" stroke="#c9a87c" stroke-opacity="0.05" stroke-width="0.6" rx="1"/>

  <!-- Small fill in first packaging rect -->
  <rect x="880" y="160" width="45" height="120" fill="#c9a87c" opacity="0.03" rx="1"/>

  <!-- Diagonal accent line -->
  <line x1="860" y1="450" x2="1050" y2="380" stroke="#c9a87c" stroke-opacity="0.06" stroke-width="0.5"/>

  <!-- Small decorative dots -->
  <circle cx="870" cy="450" r="2" fill="#c9a87c" opacity="0.15"/>
  <circle cx="1050" cy="380" r="1.5" fill="#c9a87c" opacity="0.1"/>
  <circle cx="520" cy="314" r="2.5" fill="#c9a87c" opacity="0.2"/>

  <!-- Corner accent marks -->
  <line x1="60" y1="60" x2="60" y2="100" stroke="#c9a87c" stroke-opacity="0.1" stroke-width="0.5"/>
  <line x1="60" y1="60" x2="100" y2="60" stroke="#c9a87c" stroke-opacity="0.1" stroke-width="0.5"/>

  <line x1="1140" y1="530" x2="1140" y2="570" stroke="#c9a87c" stroke-opacity="0.1" stroke-width="0.5"/>
  <line x1="1100" y1="570" x2="1140" y2="570" stroke="#c9a87c" stroke-opacity="0.1" stroke-width="0.5"/>

  <!-- Floating gold particles -->
  <circle cx="400" cy="200" r="1" fill="#c9a87c" opacity="0.12"/>
  <circle cx="650" cy="150" r="0.8" fill="#c9a87c" opacity="0.1"/>
  <circle cx="800" cy="500" r="1.2" fill="#c9a87c" opacity="0.08"/>
  <circle cx="350" cy="450" r="0.6" fill="#c9a87c" opacity="0.15"/>
  <circle cx="550" cy="520" r="0.9" fill="#c9a87c" opacity="0.1"/>
  <circle cx="950" cy="100" r="0.7" fill="#c9a87c" opacity="0.12"/>

  <!-- Vertical gold accent left edge -->
  <rect x="60" y="120" width="1" height="390" fill="url(#goldVertical)"/>

  <!-- Subtle arc suggesting tea bowl rim -->
  <path d="M 600 580 Q 720 530 840 580" fill="none" stroke="#c9a87c" stroke-opacity="0.06" stroke-width="0.8"/>

  <!-- Small kanji accent -->
  <text x="910" y="500" font-family="'Hiragino Mincho ProN', 'Yu Mincho', 'MS Mincho', serif" font-size="14" fill="#c9a87c" opacity="0.15" letter-spacing="4">茶</text>

  <!-- Brand name in Roman letters -->
  <text x="100" y="308" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" fill="#c9a87c" opacity="0.25" letter-spacing="8" font-weight="300">KUROMOJI</text>

  <!-- Subtle right-side vertical line -->
  <line x1="1060" y1="100" x2="1060" y2="530" stroke="#c9a87c" stroke-opacity="0.03" stroke-width="0.5"/>

  <!-- Noise texture overlay -->
  <rect width="1200" height="630" fill="transparent" filter="url(#grain)"/>
</svg>