<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="KADO">
  <defs>
    <linearGradient id="d-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e0c12"/>
      <stop offset="1" stop-color="#171420"/>
    </linearGradient>
    <linearGradient id="d-stem" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="rgba(200,160,220,0.05)"/>
      <stop offset="1" stop-color="rgba(200,160,220,0.45)"/>
    </linearGradient>
    <radialGradient id="d-petalGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="rgba(215,180,235,0.35)"/>
      <stop offset="1" stop-color="rgba(215,180,235,0)"/>
    </radialGradient>
    <linearGradient id="d-base" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(200,160,220,0)"/>
      <stop offset="0.5" stop-color="rgba(200,160,220,0.45)"/>
      <stop offset="1" stop-color="rgba(200,160,220,0)"/>
    </linearGradient>
    <filter id="d-blur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#d-bg)"/>

  <!-- kanji watermark -->
  <text x="850" y="400" text-anchor="middle" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="380" fill="#e9eef4" opacity="0.04">華</text>

  <!-- soft lavender glow at bloom -->
  <circle cx="640" cy="160" r="120" fill="url(#d-petalGlow)" filter="url(#d-blur)"/>

  <!-- elegant curved stem rising from bottom-center -->
  <path d="M600 500 C600 420, 540 380, 565 300 C588 228, 640 210, 640 160" fill="none" stroke="url(#d-stem)" stroke-width="2" stroke-linecap="round"/>
  <!-- secondary leaf curve -->
  <path d="M585 360 C540 340, 510 345, 480 320" fill="none" stroke="rgba(200,160,220,0.18)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- organic petal ellipses -->
  <ellipse cx="640" cy="150" rx="34" ry="16" transform="rotate(-28 640 150)" fill="rgba(215,180,235,0.20)" stroke="rgba(215,180,235,0.45)" stroke-width="1"/>
  <ellipse cx="660" cy="170" rx="22" ry="10" transform="rotate(22 660 170)" fill="rgba(215,180,235,0.10)" stroke="rgba(215,180,235,0.25)" stroke-width="0.8"/>
  <circle cx="640" cy="158" r="2.5" fill="rgba(240,225,250,0.8)"/>

  <!-- floating bud -->
  <circle cx="500" cy="240" r="3" fill="rgba(215,180,235,0.4)"/>
  <circle cx="730" cy="260" r="2" fill="rgba(215,180,235,0.25)"/>

  <!-- thin horizontal base line with centered dot -->
  <rect x="320" y="500" width="560" height="1" fill="url(#d-base)"/>
  <circle cx="600" cy="500" r="3.5" fill="rgba(215,180,235,0.65)"/>
  <circle cx="600" cy="500" r="9" fill="none" stroke="rgba(215,180,235,0.20)" stroke-width="1"/>

  <!-- quiet vertical hairline, restraint -->
  <line x1="180" y1="120" x2="180" y2="300" stroke="rgba(200,160,220,0.12)" stroke-width="1"/>

  <!-- title -->
  <text x="120" y="567" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="300" letter-spacing="14" fill="#e9eef4" opacity="0.8">KADO</text>
  <text x="120" y="594" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="300" letter-spacing="6" fill="rgba(215,180,235,0.5)">IKEBANA STUDIO — VISUAL IDENTITY</text>
</svg>
