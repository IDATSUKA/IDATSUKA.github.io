<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="SORA Architecture">
  <defs>
    <linearGradient id="s-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0e12"/>
      <stop offset="1" stop-color="#151b22"/>
    </linearGradient>
    <linearGradient id="s-facade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(140,170,200,0.08)"/>
      <stop offset="1" stop-color="rgba(140,170,200,0.015)"/>
    </linearGradient>
    <linearGradient id="s-edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(110,170,230,0)"/>
      <stop offset="0.5" stop-color="rgba(110,170,230,0.85)"/>
      <stop offset="1" stop-color="rgba(110,170,230,0)"/>
    </linearGradient>
    <pattern id="s-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="rgba(170,190,210,0.05)" stroke-width="1"/>
    </pattern>
    <filter id="s-blur" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#s-bg)"/>

  <!-- architectural grid lower half -->
  <rect x="0" y="330" width="1200" height="300" fill="url(#s-grid)"/>

  <!-- SORA watermark -->
  <text x="600" y="380" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="240" font-weight="100" letter-spacing="90" fill="#e9eef4" opacity="0.04">SORA</text>

  <!-- overlapping translucent facades -->
  <rect x="250" y="170" width="180" height="290" fill="url(#s-facade)" stroke="rgba(170,195,220,0.20)" stroke-width="1"/>
  <rect x="380" y="110" width="220" height="350" fill="url(#s-facade)" stroke="rgba(170,195,220,0.28)" stroke-width="1"/>
  <rect x="540" y="200" width="150" height="260" fill="url(#s-facade)" stroke="rgba(170,195,220,0.16)" stroke-width="1"/>
  <rect x="660" y="140" width="200" height="320" fill="url(#s-facade)" stroke="rgba(170,195,220,0.22)" stroke-width="1"/>

  <!-- facade mullions -->
  <line x1="453" y1="110" x2="453" y2="460" stroke="rgba(170,195,220,0.10)" stroke-width="0.8"/>
  <line x1="526" y1="110" x2="526" y2="460" stroke="rgba(170,195,220,0.10)" stroke-width="0.8"/>
  <line x1="380" y1="225" x2="600" y2="225" stroke="rgba(170,195,220,0.08)" stroke-width="0.8"/>
  <line x1="380" y1="340" x2="600" y2="340" stroke="rgba(170,195,220,0.08)" stroke-width="0.8"/>
  <line x1="726" y1="140" x2="726" y2="460" stroke="rgba(170,195,220,0.08)" stroke-width="0.8"/>
  <line x1="793" y1="140" x2="793" y2="460" stroke="rgba(170,195,220,0.08)" stroke-width="0.8"/>

  <!-- steel-blue accent edge with glow -->
  <rect x="378" y="110" width="3" height="350" fill="url(#s-edge)" filter="url(#s-blur)"/>
  <rect x="379.5" y="110" width="1" height="350" fill="rgba(150,200,245,0.9)"/>

  <!-- ground line -->
  <line x1="160" y1="460" x2="1040" y2="460" stroke="rgba(190,205,220,0.30)" stroke-width="1"/>

  <!-- dimension line with ticks -->
  <g stroke="rgba(170,195,220,0.35)" stroke-width="1">
    <line x1="380" y1="495" x2="860" y2="495"/>
    <line x1="380" y1="488" x2="380" y2="502"/>
    <line x1="600" y1="490" x2="600" y2="500"/>
    <line x1="860" y1="488" x2="860" y2="502"/>
  </g>
  <text x="620" y="488" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="10" letter-spacing="3" fill="rgba(170,195,220,0.45)">24,000</text>

  <!-- title -->
  <text x="120" y="555" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="300" letter-spacing="14" fill="#e9eef4" opacity="0.8">SORA ARCHITECTURE</text>
  <text x="120" y="582" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="300" letter-spacing="6" fill="rgba(150,200,245,0.55)">CORPORATE SITE — ART DIRECTION</text>
</svg>
