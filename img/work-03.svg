<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Subtle noise filter -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" seed="8"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="0.04"/>
        <feFuncG type="linear" slope="0.04"/>
        <feFuncB type="linear" slope="0.04"/>
        <feFuncA type="linear" slope="0.1"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>

    <!-- Soft shadow for buildings -->
    <filter id="buildingShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Blue accent glow -->
    <filter id="blueGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" in="SourceGraphic" result="blur1"/>
      <feGaussianBlur stdDeviation="12" in="SourceGraphic" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111416"/>
      <stop offset="100%" stop-color="#0e1012"/>
    </linearGradient>

    <!-- Building facade gradients -->
    <linearGradient id="building1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1d20" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#141618" stop-opacity="0.6"/>
    </linearGradient>

    <linearGradient id="building2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1f23" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#121416" stop-opacity="0.5"/>
    </linearGradient>

    <linearGradient id="building3" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#181b1e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#101214" stop-opacity="0.4"/>
    </linearGradient>

    <!-- Blue accent gradient -->
    <linearGradient id="blueAccent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a9ece" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#4a9ece" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4a9ece" stop-opacity="0"/>
    </linearGradient>

    <!-- Grid pattern for architectural lines -->
    <pattern id="archGrid" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="translate(0, 350)">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="0.4"/>
    </pattern>

    <!-- Fine grid -->
    <pattern id="fineGrid" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="translate(0, 400)">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#ffffff" stroke-opacity="0.012" stroke-width="0.3"/>
    </pattern>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Large watermark text SORA -->
  <text x="600" y="420" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="240" fill="#ffffff" opacity="0.025" text-anchor="middle" font-weight="100" letter-spacing="40">SORA</text>

  <!-- Architectural grid in bottom half -->
  <rect x="0" y="300" width="1200" height="330" fill="url(#archGrid)"/>
  <rect x="0" y="380" width="1200" height="250" fill="url(#fineGrid)"/>

  <!-- Building facade 1 - tall rectangle left-center -->
  <rect x="280" y="80" width="200" height="470" fill="url(#building1)" filter="url(#buildingShadow)"/>
  <rect x="280" y="80" width="200" height="470" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="0.5"/>

  <!-- Building facade 2 - overlapping, wider -->
  <rect x="400" y="150" width="260" height="400" fill="url(#building2)"/>
  <rect x="400" y="150" width="260" height="400" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>

  <!-- Building facade 3 - right side -->
  <rect x="720" y="120" width="180" height="430" fill="url(#building3)"/>
  <rect x="720" y="120" width="180" height="430" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="0.5"/>

  <!-- Building facade 4 - narrow tall -->
  <rect x="620" y="200" width="80" height="350" fill="#151820" opacity="0.5"/>
  <rect x="620" y="200" width="80" height="350" fill="none" stroke="#ffffff" stroke-opacity="0.025" stroke-width="0.4"/>

  <!-- Building with blue accent border-left -->
  <rect x="500" y="100" width="160" height="450" fill="#161a1d" opacity="0.6"/>
  <rect x="500" y="100" width="160" height="450" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.4"/>
  <!-- Blue accent left border -->
  <rect x="498" y="100" width="2.5" height="450" fill="url(#blueAccent)" filter="url(#blueGlow)"/>

  <!-- Horizontal architectural lines -->
  <line x1="100" y1="400" x2="1100" y2="400" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.4"/>
  <line x1="200" y1="440" x2="1000" y2="440" stroke="#ffffff" stroke-opacity="0.025" stroke-width="0.3"/>
  <line x1="150" y1="480" x2="1050" y2="480" stroke="#ffffff" stroke-opacity="0.02" stroke-width="0.3"/>
  <line x1="250" y1="520" x2="950" y2="520" stroke="#ffffff" stroke-opacity="0.015" stroke-width="0.3"/>

  <!-- Vertical structural lines -->
  <line x1="280" y1="80" x2="280" y2="600" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.3"/>
  <line x1="480" y1="80" x2="480" y2="600" stroke="#ffffff" stroke-opacity="0.025" stroke-width="0.3"/>
  <line x1="660" y1="150" x2="660" y2="600" stroke="#ffffff" stroke-opacity="0.02" stroke-width="0.3"/>
  <line x1="900" y1="120" x2="900" y2="600" stroke="#ffffff" stroke-opacity="0.025" stroke-width="0.3"/>

  <!-- Window-like subdivisions on building 1 -->
  <line x1="340" y1="120" x2="340" y2="540" stroke="#ffffff" stroke-opacity="0.02" stroke-width="0.3"/>
  <line x1="400" y1="120" x2="400" y2="540" stroke="#ffffff" stroke-opacity="0.02" stroke-width="0.3"/>
  <line x1="290" y1="180" x2="470" y2="180" stroke="#ffffff" stroke-opacity="0.015" stroke-width="0.3"/>
  <line x1="290" y1="280" x2="470" y2="280" stroke="#ffffff" stroke-opacity="0.015" stroke-width="0.3"/>
  <line x1="290" y1="380" x2="470" y2="380" stroke="#ffffff" stroke-opacity="0.015" stroke-width="0.3"/>

  <!-- Window details on building with blue accent -->
  <rect x="520" y="160" width="30" height="20" fill="none" stroke="#ffffff" stroke-opacity="0.025" stroke-width="0.3"/>
  <rect x="560" y="160" width="30" height="20" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="0.3"/>
  <rect x="610" y="160" width="30" height="20" fill="none" stroke="#ffffff" stroke-opacity="0.015" stroke-width="0.3"/>
  <rect x="520" y="200" width="30" height="20" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="0.3"/>
  <rect x="560" y="200" width="30" height="20" fill="none" stroke="#ffffff" stroke-opacity="0.015" stroke-width="0.3"/>

  <!-- Dimension/measurement lines (architectural drawing style) -->
  <line x1="100" y1="80" x2="100" y2="550" stroke="#4a9ece" stroke-opacity="0.06" stroke-width="0.3" stroke-dasharray="2,4"/>
  <line x1="95" y1="80" x2="105" y2="80" stroke="#4a9ece" stroke-opacity="0.06" stroke-width="0.3"/>
  <line x1="95" y1="550" x2="105" y2="550" stroke="#4a9ece" stroke-opacity="0.06" stroke-width="0.3"/>

  <!-- Horizontal dimension line -->
  <line x1="280" y1="580" x2="900" y2="580" stroke="#4a9ece" stroke-opacity="0.05" stroke-width="0.3" stroke-dasharray="2,4"/>
  <line x1="280" y1="575" x2="280" y2="585" stroke="#4a9ece" stroke-opacity="0.05" stroke-width="0.3"/>
  <line x1="900" y1="575" x2="900" y2="585" stroke="#4a9ece" stroke-opacity="0.05" stroke-width="0.3"/>

  <!-- Small annotation text (architectural style) -->
  <text x="87" y="320" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="7" fill="#4a9ece" opacity="0.1" text-anchor="end" transform="rotate(-90, 87, 320)">470mm</text>
  <text x="590" y="595" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="7" fill="#4a9ece" opacity="0.1" text-anchor="middle">620mm</text>

  <!-- Cross/plus marks at intersections -->
  <line x1="277" y1="400" x2="283" y2="400" stroke="#4a9ece" stroke-opacity="0.08" stroke-width="0.4"/>
  <line x1="280" y1="397" x2="280" y2="403" stroke="#4a9ece" stroke-opacity="0.08" stroke-width="0.4"/>

  <line x1="897" y1="400" x2="903" y2="400" stroke="#4a9ece" stroke-opacity="0.08" stroke-width="0.4"/>
  <line x1="900" y1="397" x2="900" y2="403" stroke="#4a9ece" stroke-opacity="0.08" stroke-width="0.4"/>

  <!-- Subtle circle marker -->
  <circle cx="500" cy="100" r="3" fill="none" stroke="#4a9ece" stroke-opacity="0.08" stroke-width="0.4"/>

  <!-- Diagonal construction line -->
  <line x1="280" y1="80" x2="900" y2="550" stroke="#ffffff" stroke-opacity="0.01" stroke-width="0.3" stroke-dasharray="4,8"/>

  <!-- Right side floating rectangle -->
  <rect x="980" y="200" width="120" height="180" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.4"/>
  <line x1="980" y1="260" x2="1100" y2="260" stroke="#ffffff" stroke-opacity="0.02" stroke-width="0.3"/>
  <line x1="1040" y1="200" x2="1040" y2="380" stroke="#ffffff" stroke-opacity="0.02" stroke-width="0.3"/>

  <!-- Brand text -->
  <text x="980" y="560" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#ffffff" opacity="0.12" letter-spacing="8" font-weight="300">SORA</text>
  <text x="980" y="575" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="7" fill="#ffffff" opacity="0.08" letter-spacing="3" font-weight="300">ARCHITECTURE</text>

  <!-- Corner frame marks -->
  <line x1="40" y1="40" x2="40" y2="75" stroke="#ffffff" stroke-opacity="0.06" stroke-width="0.4"/>
  <line x1="40" y1="40" x2="75" y2="40" stroke="#ffffff" stroke-opacity="0.06" stroke-width="0.4"/>

  <line x1="1160" y1="40" x2="1160" y2="75" stroke="#ffffff" stroke-opacity="0.06" stroke-width="0.4"/>
  <line x1="1125" y1="40" x2="1160" y2="40" stroke="#ffffff" stroke-opacity="0.06" stroke-width="0.4"/>

  <line x1="40" y1="555" x2="40" y2="590" stroke="#ffffff" stroke-opacity="0.06" stroke-width="0.4"/>
  <line x1="40" y1="590" x2="75" y2="590" stroke="#ffffff" stroke-opacity="0.06" stroke-width="0.4"/>

  <line x1="1160" y1="555" x2="1160" y2="590" stroke="#ffffff" stroke-opacity="0.06" stroke-width="0.4"/>
  <line x1="1125" y1="590" x2="1160" y2="590" stroke="#ffffff" stroke-opacity="0.06" stroke-width="0.4"/>

  <!-- Subtle blue horizontal accent -->
  <line x1="498" y1="315" x2="498" y2="315" stroke="#4a9ece" stroke-opacity="0" stroke-width="0"/>
  <rect x="40" y="315" width="200" height="0.5" fill="#4a9ece" opacity="0.06"/>

  <!-- Small detail dots -->
  <circle cx="160" cy="200" r="1" fill="#ffffff" opacity="0.05"/>
  <circle cx="1050" cy="150" r="0.8" fill="#ffffff" opacity="0.04"/>
  <circle cx="850" cy="500" r="1.2" fill="#4a9ece" opacity="0.06"/>

  <!-- Noise texture overlay -->
  <rect width="1200" height="630" fill="transparent" filter="url(#grain)"/>
</svg>