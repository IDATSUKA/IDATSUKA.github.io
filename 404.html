<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%230a0a0a'/><text x='16' y='22' text-anchor='middle' font-size='18' font-family='sans-serif' font-weight='600' fill='%23c9a87c'>I</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="/" class="logo">Idatsuka<span class="logo-dot">.</span></a>
  <ul class="nav-links">
    <li><a href="about.html">About</a></li>
    <li><a href="works.html">Works</a></li>
    <li><a href="blog.html">Blog</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <button class="menu-toggle" id="menuToggle" aria-label="メニュー"><span></span><span></span><span></span></button>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <a href="about.html">About</a>
  <a href="works.html">Works</a>
  <a href="blog.html">Blog</a>
  <a href="contact.html">Contact</a>
</div>

<main class="error-page">
  <div>
    <div class="error-code">404</div>
    <p class="error-text">お探しのページは見つかりませんでした。</p>
    <a href="/" class="btn">Back to Home</a>
  </div>
</main>

<script>
document.getElementById('menuToggle').addEventListener('click', function() {
  this.classList.toggle('open');
  document.getElementById('mobileMenu').classList.toggle('open');
});
document.querySelectorAll('.mobile-menu a').forEach(a => {
  a.addEventListener('click', () => {
    document.getElementById('menuToggle').classList.remove('open');
    document.getElementById('mobileMenu').classList.remove('open');
  });
});
const io = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('on'); io.unobserve(e.target); } });
}, { threshold: .1 });
document.querySelectorAll('.rv').forEach(el => io.observe(el));
</script>
</body>
</html>
